    let row='',ry=cy+htpPad+28+i*bodyLH;
    words.forEach(w=>{
      const test=row?row+' '+w:w;
      if(g.measureText(test).width>safeW&&row){
        g.fillText(row,safeX+safeW/2,ry);row=w;ry+=bodyLH;
      } else row=test;
    });
    if(row)g.fillText(row,safeX+safeW/2,ry);
  });

  // Nav arrows — instant, no animation
  const prevActive=htpCard>0;
  g.fillStyle=prevActive?'rgba(91,200,245,0.08)':'rgba(91,200,245,0.02)';
  g.fillRect(32,cy,arrW,htpH);
  g.fillStyle=prevActive?C1:'#2a2a3a';
  g.font='bold 22px system-ui,-apple-system,sans-serif';g.textAlign='center';
  g.fillText('\u25c4',32+arrW/2,cy+htpH/2+8);
  mkbtn(32,cy,arrW,htpH,()=>{htpCard=prevActive?htpCard-1:HTP_CARDS_COUNT-1;});

  const nextActive=htpCard<HTP_CARDS_COUNT-1;
  g.fillStyle=nextActive?'rgba(91,200,245,0.08)':'rgba(91,200,245,0.02)';
  g.fillRect(W-32-arrW,cy,arrW,htpH);
  g.fillStyle=nextActive?C1:'#2a2a3a';
  g.font='bold 22px system-ui,-apple-system,sans-serif';g.textAlign='center';
  g.fillText('\u25ba',W-32-arrW/2,cy+htpH/2+8);
  mkbtn(W-32-arrW,cy,arrW,htpH,()=>{htpCard=nextActive?htpCard+1:0;});

  // Dot indicators
  const dotR=3,dotGap=10,dotsW=(HTP_CARDS_COUNT-1)*dotGap;
  const dotStartX=W/2-dotsW/2;
  HTP_CARDS.forEach((_,i)=>{
    g.fillStyle=i===htpCard?C1:'#2a2a3a';
    g.beginPath();g.arc(dotStartX+i*dotGap,cy+htpH-8,dotR,0,Math.PI*2);g.fill();
  });
  g.fillStyle=TX.faint;g.font='9px system-ui,-apple-system,sans-serif';g.textAlign='right';
  g.fillText((htpCard+1)+' / '+HTP_CARDS_COUNT,W-32-arrW-4,cy+htpH-5);

  cy+=htpH+8;

  // ── THREE COLUMNS: MODE | CAMPAIGN LEVELS | BOONS & BAFOONS ──
  const totalStarsM=campaignStars.reduce((s,n)=>s+n,0);
  const raidStarReq=15;
  const raidUnlockable=totalStarsM>=raidStarReq;
  const isMobilePortrait=IS_TOUCH&&IS_PORTRAIT();

  const itemStep=18;
  const colPadTop=18,colPadBot=10;
  const colH=colPadTop+itemStep*(LEVELS.length+1)+colPadBot;
  const colHdrY=cy+12;

  // Column X positions — MODE | CAMPAIGN | BOONS
  const modeW=188,campW=252,boonsW=W-64-modeW-campW-16;
  const modeX=32,campX=modeX+modeW+8,boonsX=campX+campW+8;

  // ── MODE column ──
  panel(modeX,cy,modeW,colH,'#3a5a90');
  g.fillStyle=TX.dim;g.font='bold 9px system-ui,-apple-system,sans-serif';g.textAlign='left';
  g.fillText('MODE',modeX+14,colHdrY);
  const modeItems=[
    {lbl:'SOLO',      key:'solo',    col:'#4ade80',dark:'#061a08'},
    ...(isMobilePortrait?[]:[{lbl:'2P LOCAL',key:'2p',col:'#4a9eff',dark:'#06162a'}]),
    {lbl:'VS AI',     key:'vsai',    col:'#bb44ff',dark:'#180628'},
    {lbl:'CAMPAIGN',  key:'campaign',col:'#ef9f27',dark:'#1a0e00'},
    {lbl:'\u2694 RAIDS',key:'_raids',col:'#ff44aa',dark:'#280018',raid:true,avail:raidUnlockable},
    {lbl:'\u26a7 COSMIC JANITOR',key:'janitor',col:'#44ffcc',dark:'#001a12',
     janitor:true,avail:raidCompleted.every(Boolean)||save.devUnlocked},
  ];
  const modeBtnH=Math.round((colH-colPadTop-colPadBot-4)/modeItems.length)-3;
  let mby2=cy+colPadTop;
  modeItems.forEach(({lbl,key,col,dark,raid,janitor:isJanitor,avail})=>{
    const on=gameMode===key;
    const locked=(raid||isJanitor)&&!avail;
    g.fillStyle=locked?'#06040c':on?dark:'#080812';g.fillRect(modeX+10,mby2,modeW-20,modeBtnH);
    g.strokeStyle=locked?'#1a1830':on?col:col+'44';g.lineWidth=on?1.4:0.6;g.strokeRect(modeX+10,mby2,modeW-20,modeBtnH);
    g.fillStyle=locked?'#2a1840':on?col:TX.dim;
    g.font=(on?'bold ':'')+Math.round((lbl.length>12?8:9.5)*fs)+'px system-ui,-apple-system,sans-serif';
    g.textAlign='center';
    g.fillText(lbl,modeX+modeW/2,mby2+Math.round(modeBtnH*0.68));
    if(!locked){
      if(raid)mkbtn(modeX+10,mby2,modeW-20,modeBtnH,()=>{gs='raidselect';gameMode='solo';});
      else mkbtn(modeX+10,mby2,modeW-20,modeBtnH,()=>gameMode=key);
    }
    mby2+=modeBtnH+3;
  });
  if(!raidUnlockable){
    g.fillStyle='#2a1840';g.font='7px system-ui,-apple-system,sans-serif';g.textAlign='center';
    g.fillText('\u2694 '+totalStarsM+'/'+raidStarReq+' \u2605 to unlock',modeX+modeW/2,cy+colH-4);
  }

  // ── CAMPAIGN LEVELS column ──
  panel(campX,cy,campW,colH,theme.accent||C1);
  g.fillStyle=theme.accent||C1;g.font='bold 9px system-ui,-apple-system,sans-serif';g.textAlign='left';
  g.fillText('CAMPAIGN LEVELS',campX+14,colHdrY);
  LEVELS.forEach((lv,i)=>{
    const unlk=i<campaignUnlocked,stars=campaignStars[i];
    const ty=cy+colPadTop+i*itemStep+itemStep;
    g.fillStyle=unlk?TX.head:'#334';g.font=(unlk?'bold ':'')+Math.round(9.5*fs)+'px system-ui,-apple-system,sans-serif';g.textAlign='left';
    g.fillText((i+1)+'. '+lv.name,campX+14,ty);
    if(unlk){for(let s=0;s<3;s++){g.fillStyle=s<stars?TX.warn:'#222';g.font='10px system-ui,-apple-system,sans-serif';g.fillText('\u2605',campX+14+118+s*14,ty);}}
    else{g.fillStyle='#334';g.font='8px system-ui,-apple-system,sans-serif';g.fillText('[LOCKED]',campX+14+118,ty);}
    if(unlk)mkbtn(campX,cy+colPadTop+i*itemStep+2,campW,itemStep,()=>{gameMode='campaign';campaignLevel=i;gs='levelselect';music.play('levelselect');});
  });

  // ── BOONS & BAFOONS column ──
  panel(boonsX,cy,boonsW,colH,TX.warn);
  g.fillStyle=TX.warn;g.font='bold 9px system-ui,-apple-system,sans-serif';g.textAlign='left';
  g.fillText('BOONS & BAFOONS',boonsX+14,colHdrY);
  BASE_PTYPES.forEach((type,i)=>{
    const pd=PUPS[type],sx=boonsX+14,ty=cy+colPadTop+i*itemStep+itemStep;
    g.fillStyle=pd.dark;g.fillRect(sx,ty-9,12,11);
    g.strokeStyle=pd.col;g.lineWidth=0.7;g.strokeRect(sx,ty-9,12,11);
    g.fillStyle=pd.col;g.font='bold 6px system-ui,-apple-system,sans-serif';g.textAlign='center';g.fillText(pd.label.slice(0,3),sx+6,ty-1);
    g.fillStyle=TX.body;g.font=Math.round(9*fs)+'px system-ui,-apple-system,sans-serif';g.textAlign='left';
    g.fillText(pd.label+' \u2014 '+pd.desc,sx+16,ty);
  });
  {const pd=PUPS.HEALTH,sx=boonsX+14,ty=cy+colPadTop+BASE_PTYPES.length*itemStep+itemStep;
  g.fillStyle=pd.dark;g.fillRect(sx,ty-9,12,11);
  g.strokeStyle=pd.col;g.lineWidth=0.7;g.strokeRect(sx,ty-9,12,11);
  g.fillStyle=pd.col;g.font='bold 6px system-ui,-apple-system,sans-serif';g.textAlign='center';g.fillText('+HP',sx+6,ty-1);
  g.fillStyle=TX.body;g.font=Math.round(9*fs)+'px system-ui,-apple-system,sans-serif';g.textAlign='left';
  g.fillText(pd.label+' \u2014 '+pd.desc+' (Raids Only)',sx+16,ty);}

  cy+=colH+20;

  // ── START BUTTON + BURROW ──
  const btnLbl=gameMode==='campaign'?'START CAMPAIGN  \u25ba':'SPACE / ENTER TO BEGIN';
  const btnH=Math.round(36+4*fs);
  const _pal=getBorderPalette();
  const _t2=Date.now()/1000;
  const _p=(Math.sin(_t2*1.4)+1)/2;
  const _lerp=(a,b,t)=>Math.round(a+(b-a)*t);
  const _seg=_p<0.5?[_pal[0],_pal[1],_p*2]:[_pal[1],_pal[2],(_p-0.5)*2];
  const _br=_lerp(_seg[0][0],_seg[1][0],_seg[2]);
  const _bg=_lerp(_seg[0][1],_seg[1][1],_seg[2]);
  const _bb=_lerp(_seg[0][2],_seg[1][2],_seg[2]);
  const _pulse=(Math.sin(_t2*2.8)+1)/2;
  const btnCol=`rgb(${_br},${_bg},${_bb})`;
  const btnDark=`rgba(${_br},${_bg},${_bb},0.08)`;

  // Main start button
  g.fillStyle=btnDark;g.fillRect(W/2-150,cy,300,btnH);
  g.strokeStyle=btnCol;g.lineWidth=1.8+_pulse*0.8;g.strokeRect(W/2-150,cy,300,btnH);
  const _cm=7;g.lineWidth=2;
  [[W/2-150,cy,1,1],[W/2+150,cy,-1,1],[W/2-150,cy+btnH,1,-1],[W/2+150,cy+btnH,-1,-1]].forEach(([bx,by,sx,sy])=>{
    g.beginPath();g.moveTo(bx,by);g.lineTo(bx+sx*_cm,by);g.stroke();
    g.beginPath();g.moveTo(bx,by);g.lineTo(bx,by+sy*_cm);g.stroke();
  });
  g.fillStyle=btnCol;g.font=F(13,true);g.textAlign='center';
  g.fillText(btnLbl,W/2,cy+Math.round(btnH*0.64));
  mkbtn(W/2-150,cy,300,btnH,()=>{
    if(gameMode==='campaign'){gs='levelselect';music.play('levelselect');}
    else if(gameMode==='janitor')startJanitorMode();
    else startFreeplay();
  });
  cy+=btnH+Math.round(5+2*fs);

  // ── DEV UNLOCK PADLOCK — bottom of screen ──
  drawPadlock(W/2, H-22, save.devUnlocked);
  if(save.devUnlocked){
    mkbtn(W/2-18, H-38, 36, 32, toggleDevUnlock);
  }

  // ── DIFFICULTY DROPDOWN — drawn last so it's above HTP cards ──
  if(diffDropOpen){
    const itemH=16;
    const totalH=DIFFS.length*itemH+2;
    const borderPad=10; // don't clip the animated border
    // Open upward from pill, clamped so top doesn't go above border
    const rawTop=dpy-totalH-2;
    const dropY=Math.max(borderPad, rawTop);
    // Panel bg
    g.fillStyle='#050510';g.fillRect(dpx-1,dropY,dpw+2,totalH);
    g.strokeStyle='#3a3a55';g.lineWidth=0.8;g.strokeRect(dpx-1,dropY,dpw+2,totalH);
    DIFFS.forEach((d,i)=>{
      const cfg=DIFF_CFG[d];
      const iy=dropY+i*itemH;
      const on=difficulty===d;
      // Row bg
      g.fillStyle=on?`rgba(${hexRGB(cfg.col)},0.18)`:'#070712';
      g.fillRect(dpx,iy,dpw,itemH);
      // Left color stripe
      g.fillStyle=cfg.col;g.fillRect(dpx,iy+2,2,itemH-4);
      // Separator
      if(i>0){g.strokeStyle='#1a1a2a';g.lineWidth=0.4;g.beginPath();g.moveTo(dpx+3,iy);g.lineTo(dpx+dpw,iy);g.stroke();}
      // FIENDISH ⛧ pentagrams in deep blood red
      if(d==='FIENDISH'){
        g.fillStyle='#770011';g.font=Math.round(7*fs)+'px system-ui,-apple-system,sans-serif';
        g.textAlign='left';g.fillText('⛧',dpx+4,iy+itemH*0.72);
        g.textAlign='right';g.fillText('⛧',dpx+dpw-4,iy+itemH*0.72);
      }
      // Label in difficulty color — full color if selected, dimmed if not
      g.fillStyle=on?cfg.col:cfg.col+'aa';
      g.font=(on?'bold ':'')+Math.round(7.5*fs)+'px system-ui,-apple-system,sans-serif';
      g.textAlign='center';
      g.fillText(d,dpx+dpw/2,iy+itemH*0.72);
      mkbtn(dpx,iy,dpw,itemH,()=>{difficulty=d;save.difficulty=d;persist();diffDropOpen=false;});
    });
  }
}

function applyDevUnlock(){
  campaignUnlocked=8;
  campaignStars=campaignStars.map(s=>Math.max(s,1)); // at least 1 star each so they're visible
  raidUnlocked=[true,true,true,true,true,true];
}

function toggleDevUnlock(){
  save.devUnlocked=!save.devUnlocked;
  if(save.devUnlocked){
    applyDevUnlock();
  } else {
    // ── NUCLEAR WIPE — everything back to zero ──
    save.coins=0;
    save.campaignStars=[0,0,0,0,0,0,0,0];
    save.raidCompleted=[false,false,false,false,false,false];
    save.upgrades={shell:1,legs:1,senses:1,core:1};
    save.cosmetic='default';
    save.purchasedCosmetics=['default'];
    save.inventory=[];
    save.equipped={helm:null,armor:null,boots:null};
    save.invStackLimit=5;
    // Sync live state
    campaignStars=[0,0,0,0,0,0,0,0];
    campaignUnlocked=1;
    raidCompleted=[false,false,false,false,false,false];
    raidUnlocked=[true,false,false,false,false,false];
    burrowUpgrades={shell:1,legs:1,senses:1,core:1};
    burrowCosmetic='default';
    burrowSelectedCos='default';
  }
  persist();
}

function drawPadlock(cx,cy,unlocked){
  const t=Date.now()/1000;
  const pulse=0.7+0.3*Math.sin(t*1.8);
  const col=unlocked?'#ffd700':'#3a4a6a';
  const glowCol=unlocked?'rgba(255,215,0,0.4)':'rgba(80,100,160,0.2)';

  // Glow halo
  g.shadowColor=glowCol.replace('0.','0.');
  g.shadowBlur=unlocked?10*pulse:4;

  // Lock body — rounded rectangle
  const bw=14,bh=10,bx=cx-bw/2,by=cy-2;
  g.fillStyle=unlocked?'#3a2800':' #0e1420';
  g.strokeStyle=col;g.lineWidth=1.2;
  // Manual rounded rect
  const br=2;
  g.beginPath();
  g.moveTo(bx+br,by);g.lineTo(bx+bw-br,by);g.arcTo(bx+bw,by,bx+bw,by+br,br);
  g.lineTo(bx+bw,by+bh-br);g.arcTo(bx+bw,by+bh,bx+bw-br,by+bh,br);
  g.lineTo(bx+br,by+bh);g.arcTo(bx,by+bh,bx,by+bh-br,br);
  g.lineTo(bx,by+br);g.arcTo(bx,by,bx+br,by,br);
  g.closePath();
  g.fill();g.stroke();

  // Keyhole
  g.fillStyle=col;g.globalAlpha=0.6;
  g.beginPath();g.arc(cx,by+bh/2,1.8,0,Math.PI*2);g.fill();
  g.globalAlpha=1;

  // Shackle
  g.strokeStyle=col;g.lineWidth=1.5;g.lineCap='round';
  if(unlocked){
    // Open — shackle swung to the right, detached
    g.beginPath();
    g.arc(cx+4,by-3,4,Math.PI*0.9,Math.PI*2.1);
    g.stroke();
  } else {
    // Closed — shackle loops into body
    g.beginPath();
    g.arc(cx,by-3,4,Math.PI,0);
    g.lineTo(cx+4,by);
    g.moveTo(cx-4,by-3);
    g.lineTo(cx-4,by);
    g.stroke();
  }

  g.shadowBlur=0;g.lineCap='butt';
}

  normal:   {normal:0.62,heroic:0.28,mythic:0.08,ascendant:0.015,legendary:0.005,fiendish:0},
  campaign: {normal:0.40,heroic:0.35,mythic:0.17,ascendant:0.06, legendary:0.015,fiendish:0.002},

// ── ITEM GENERATION ──────────────────────────────────────────────────────────
function rollTier(table){
  let r=Math.random(),cum=0;
  for(const [t,p] of Object.entries(table)){cum+=p;if(r<cum)return t;}
  return 'normal';
}

function rollMods(tier,bias){
  const cfg=ITEM_TIERS[tier];if(!cfg||tier==='fiendish')return[];
  const [mn,mx]=cfg.modCount;
  const count=mn+Math.floor(Math.random()*(mx-mn+1));
  const pool=[...ITEM_MODS].sort((a,b)=>(bias[b.key]||0)-(bias[a.key]||0));
  return pool.slice(0,count).map(mod=>{
    const range=mod[tier]||mod.norm;
    return {key:mod.key,val:range[0]+Math.floor(Math.random()*(range[1]-range[0]+1))};
  });
}

function makeItem(slot,subtype,tier){
  const variants=ITEM_VARIANTS[slot]||[];
  const variant=variants.find(v=>v.key===subtype)||variants[Math.floor(Math.random()*variants.length)];
  if(!variant)return null;
  if(tier==='fiendish'){
    const pool=FIENDISH_UNIQUES.filter(u=>u.slot===slot);
    if(pool.length>0){
      const u=pool[Math.floor(Math.random()*pool.length)];
      return{slot,subtype:u.subtype,tier:'fiendish',mods:[...u.mods],unique:u.unique,
             name:u.name,flavor:u.flavor,theme:u.theme,col:u.col,count:1,fiendish:true,
             uid:Math.random().toString(36).slice(2,10)};
    }
  }
  return{slot,subtype:variant.key,tier,mods:rollMods(tier,variant.bias),count:1,fiendish:false,
         uid:Math.random().toString(36).slice(2,10)};
}

function rollDrops(source){
  const table=DROP_TABLES[source]||DROP_TABLES.normal;
  const avgCounts={normal:0.25,campaign:0.5,raid:1.2,boss:2.0};
  const avg=avgCounts[source]||0.25;
  const count=Math.random()<(avg%1)?Math.ceil(avg):Math.floor(avg);
  const drops=[];
  for(let i=0;i<count;i++){
    const tier=rollTier(table);
    const slots=['helm','armor','boots'];
    const slot=slots[Math.floor(Math.random()*3)];
    const item=makeItem(slot,null,tier);
    if(item)drops.push(item);
  }
  return drops;
}

// ── INVENTORY MANAGEMENT ─────────────────────────────────────────────────────
function addToInventory(item){
  if(!save.inventory)save.inventory=[];
  if(item.fiendish){
    save.inventory.push(item);
  } else {
    const ex=save.inventory.find(i=>!i.fiendish&&i.slot===item.slot&&i.subtype===item.subtype&&i.tier===item.tier);
    if(ex){ex.count=Math.min((ex.count||1)+1,save.invStackLimit||5);}
    else save.inventory.push({...item,count:1});
  }
}

function combineItems(idx){
  if(!save.inventory)return null;
  const item=save.inventory[idx];
  if(!item||item.fiendish||(item.count||1)<3)return null;
  const ti=TIER_ORDER.indexOf(item.tier);
  if(ti<0||ti>=TIER_ORDER.length-1)return null; // already legendary
  const nextTier=TIER_ORDER[ti+1];
  item.count-=3;
  if(item.count<=0)save.inventory.splice(idx,1);
  const newItem=makeItem(item.slot,item.subtype,nextTier);
  if(newItem)addToInventory(newItem);
  persist();
  return newItem;
}

function equipItem(idx){
  if(!save.inventory||!save.equipped)return;
  const item=save.inventory[idx];if(!item)return;
  const old=save.equipped[item.slot];
  if(old)addToInventory({...old,count:1}); // return old to inventory
  save.equipped[item.slot]=item;
  // Remove from inventory
  item.count=(item.count||1)-1;
  if(item.count<=0)save.inventory.splice(idx,1);
  persist();
}

function unequipSlot(slot){
  if(!save.equipped||!save.equipped[slot])return;
  addToInventory({...save.equipped[slot],count:1});
  save.equipped[slot]=null;
  persist();
}

function getGearStats(){
  if(!save||!save.equipped)return{};
  const s={speed_pct:0,capture_resist:0,score_mult:0,seam_bonus:0,raid_reduce:0,coin_bonus:0,crit_score:0,pup_duration:0};
  ['helm','armor','boots'].forEach(slot=>{
    const item=save.equipped[slot];if(!item)return;
    (item.mods||[]).forEach(({key,val})=>{if(s[key]!==undefined)s[key]+=val;});
  });
  return s;
}

function hasUnique(key){
  if(!save||!save.equipped)return false;
  return['helm','armor','boots'].some(s=>{const i=save.equipped[s];return i&&i.unique===key;});
}

          if(invConfirm&&invConfirm.type==='combine'&&invConfirm.idx===invSelectedIdx){
            combineItems(invSelectedIdx);invSelectedIdx=-1;invConfirm=null;
          } else {
            invConfirm={type:'combine',idx:invSelectedIdx};
          }
        });
        if(invConfirm&&invConfirm.type==='combine'&&invConfirm.idx===invSelectedIdx){
          g.fillStyle='rgba(239,159,39,0.15)';g.fillRect(bx2,by2,bw2,bh2);

          g.fillText('3× → 1 '+ITEM_TIERS[nextTier]?.label+'!',bx2+bw2/2,by2+bh2*0.4);
        }

    }

}

  if(w.shield)return'\u25c9 SHIELD';return'';
}

  // Coin counter — small pill left of music toggle
  {const cbx=W-104,cby=GY-20,cbw=46,cbh=16;
  g.fillStyle='#141200';g.fillRect(cbx,cby,cbw,cbh);
  g.strokeStyle='#3a3000';g.lineWidth=0.7;g.strokeRect(cbx,cby,cbw,cbh);
  g.fillStyle='#ffd700';g.font=FS(8,true);g.textAlign='center';
  g.fillText('\u25c9 '+(save.coins+runCoins),cbx+cbw/2,cby+11);}
}

// ── BOSS VISUALS ──────────────────────────────────────────────────────────────
function drawBoss(){
  if(!raidMode||!currentRaid)return;
  const rd=currentRaid;
  const t=Date.now()/1000;
  const bx=boss.gx*CS,by=GY+boss.gy*CS,bw=boss.w*CS,bh=boss.h*CS;

  // ── Attraction field rings ──
  const warnFlash=boss.attractWarn>0;
  const dmgFlash=boss.attractActive>0;
  for(let ring=1;ring<=boss.attractMax;ring++){
    const rx=bx-ring*CS,ry=by-ring*CS,rw=bw+ring*2*CS,rh=bh+ring*2*CS;
    let alpha=0,col='255,80,0';
    if(dmgFlash&&ring<=boss.attractRadius){alpha=0.55;col='255,160,30';}
    else if(warnFlash&&ring<=boss.attractRadius){alpha=0.3+0.3*Math.sin(t*18);col='255,80,0';}
    else if(ring<=boss.attractRadius){alpha=0.08+0.05*Math.sin(t*1.8+ring);}
    else{alpha=0.03;}
    if(alpha>0){
      g.strokeStyle=`rgba(${col||hexRGB(rd.bossGlow)},${alpha})`;
      g.lineWidth=dmgFlash&&ring<=boss.attractRadius?2.5:1;
      g.strokeRect(rx,ry,rw,rh);
      if(dmgFlash&&ring<=boss.attractRadius){
        g.fillStyle=`rgba(255,80,0,0.04)`;g.fillRect(rx,ry,rw,rh);
      }
    }
  }

  // ── Boss body ──
  const pulse=(Math.sin(t*2.2)+1)*0.5;
  g.fillStyle=rd.bossDark;g.fillRect(bx,by,bw,bh);
  // Scan lines — horizontal bands sweeping downward
  const scanSpeed=t*28%bh;
  for(let sy2=0;sy2<bh;sy2+=4){
    const scanAlpha=0.06+0.04*Math.sin((sy2-scanSpeed)/bh*Math.PI*6);
    g.fillStyle=`rgba(${hexRGB(rd.bossGlow)},${Math.max(0,scanAlpha)})`;
    g.fillRect(bx+1,by+sy2,bw-2,2);
  }
  // Pulsing core
  const coreX=bx+bw/2,coreY=by+bh/2;
  const coreR=(Math.min(bw,bh)*0.2)*(0.8+pulse*0.2);
  const coreGrad=g.createRadialGradient(coreX,coreY,0,coreX,coreY,coreR);
  coreGrad.addColorStop(0,`rgba(${hexRGB(rd.bossGlow)},${0.55+pulse*0.35})`);
  coreGrad.addColorStop(0.5,`rgba(${hexRGB(rd.bossGlow)},${0.15+pulse*0.1})`);
  coreGrad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=coreGrad;g.beginPath();g.arc(coreX,coreY,coreR*1.8,0,Math.PI*2);g.fill();
  // Inner glow pulse
  g.fillStyle=`rgba(${hexRGB(rd.bossGlow)},${0.06+pulse*0.12})`;g.fillRect(bx+1,by+1,bw-2,bh-2);
  // Border
  g.strokeStyle=rd.bossCol;g.lineWidth=1.8+pulse*0.8;g.strokeRect(bx,by,bw,bh);
  // Corner marks
  const cm=5;[[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([cx2,cy2])=>{
    g.strokeStyle=rd.bossGlow;g.lineWidth=2;
    g.beginPath();g.moveTo(cx2-(cx2>bx?cm:0),cy2);g.lineTo(cx2+(cx2===bx?cm:0),cy2);g.stroke();
    g.beginPath();g.moveTo(cx2,cy2-(cy2>by?cm:0));g.lineTo(cx2,cy2+(cy2===by?cm:0));g.stroke();
  });
  // Boss name
  const fsize=Math.max(8,Math.round(Math.min(bw,bh)*0.2));
  g.shadowColor=rd.bossGlow;g.shadowBlur=8;
  g.fillStyle=rd.bossGlow;g.font=`bold ${fsize}px system-ui,-apple-system,sans-serif`;g.textAlign='center';
  g.fillText(rd.name,bx+bw/2,by+bh/2+fsize*0.35);
  g.shadowBlur=0;

  // ── Vorrax — Void Breath warning (3-cell wide) ──
  if(rd.id===0&&boss.dbWarn>0&&boss.dbDir){
    const fade=boss.dbWarn/1.4,flick=Math.sin(t*20)*0.4+0.6;
    g.strokeStyle=`rgba(255,140,0,${fade*0.9*flick})`;g.lineWidth=3;
    if(boss.dbDir.type==='row'){
      // 5-cell highlight: idx-2 through idx+2
      for(let o=-2;o<=2;o++){
        const ry2=GY+(boss.dbDir.idx+o)*CS;
        if(ry2<GY||ry2>=GY+ROWS*CS)continue;
        g.fillStyle=`rgba(255,${o===0?100:60},0,${fade*(o===0?0.14:0.06)*flick})`;
        g.fillRect(0,ry2,W,CS);
      }
      const dy2=GY+boss.dbDir.idx*CS+CS/2;
      g.beginPath();g.moveTo(0,dy2);g.lineTo(W,dy2);g.stroke();
      g.fillStyle=`rgba(255,180,0,${fade*0.8})`;g.font='bold 9px system-ui,-apple-system,sans-serif';g.textAlign='right';
      g.fillText('VOID BREATH \xb13',W-4,dy2-3);
    } else {
      for(let o=-1;o<=1;o++){
        const rx2=(boss.dbDir.idx+o)*CS;
        if(rx2<0||rx2>=W)continue;
        g.fillStyle=`rgba(255,${o===0?100:60},0,${fade*(o===0?0.14:0.06)*flick})`;
        g.fillRect(rx2,GY,CS,ROWS*CS);
      }
      const dx2=boss.dbDir.idx*CS+CS/2;
      g.beginPath();g.moveTo(dx2,GY);g.lineTo(dx2,GY+ROWS*CS);g.stroke();
    }
  }

  // ── Vorrax — Fragment cells ──
  if(rd.id===0)boss.wpCells.forEach(({r,c})=>{
    const wx=c*CS,wy=GY+r*CS;
    g.fillStyle='#1a0030';g.fillRect(wx,wy,CS,CS);
    g.strokeStyle='#9922cc';g.lineWidth=1;g.strokeRect(wx+0.5,wy+0.5,CS-1,CS-1);
    g.fillStyle='#dd66ff';g.font='bold 7px system-ui,-apple-system,sans-serif';g.textAlign='center';g.fillText('W',wx+CS/2,wy+CS/2+3);
  });

  // ── C'Thun — Eye Beam ──
  if(rd.id===1&&boss.eyeActive){
    const bcx=bx+bw/2,bcy=by+bh/2;
    const len=Math.max(W,H)*1.5;
    const ex=bcx+Math.cos(boss.eyeAngle)*len,ey=bcy+Math.sin(boss.eyeAngle)*len;
    g.strokeStyle='rgba(0,255,136,0.08)';g.lineWidth=CS*2;
    g.beginPath();g.moveTo(bcx,bcy);g.lineTo(ex,ey);g.stroke();
    g.strokeStyle='rgba(0,255,136,0.35)';g.lineWidth=4;
    g.beginPath();g.moveTo(bcx,bcy);g.lineTo(ex,ey);g.stroke();
    g.strokeStyle='rgba(180,255,220,0.9)';g.lineWidth=1.5;
    g.beginPath();g.moveTo(bcx,bcy);g.lineTo(ex,ey);g.stroke();
    // Pupil dot
    g.fillStyle='#00ffaa';g.beginPath();g.arc(bcx,bcy,5,0,Math.PI*2);g.fill();
  }

  // ── C'Thun — Tentacles ──
  if(rd.id===1)boss.tentacles.forEach(t=>{
    const tx=t.c*CS,ty=GY+t.r*CS;
    g.fillStyle='#001a08';g.fillRect(tx,ty,CS,CS);
    g.strokeStyle='#00aa44';g.lineWidth=1;g.strokeRect(tx+0.5,ty+0.5,CS-1,CS-1);
    g.fillStyle='#00ff66';g.font='bold 7px system-ui,-apple-system,sans-serif';g.textAlign='center';g.fillText('T',tx+CS/2,ty+CS/2+3);
  });

  // ── C'Thun — Corruption warning ──
  if(rd.id===1&&boss.corruptActive>0){
    const fade=Math.min(1,boss.corruptActive/0.5);
    g.fillStyle=`rgba(80,0,160,${fade*0.18})`;g.fillRect(0,GY,W,ROWS*CS);
    if(Math.sin(t*8)>0){
      g.fillStyle=`rgba(180,80,255,${fade*0.7})`;g.font='bold 11px system-ui,-apple-system,sans-serif';g.textAlign='center';
      g.fillText('CORRUPTION — CONTROLS INVERTED',W/2,GY+18);
    }
  }

  // ── Malgath — Void Shatter warning cells ──
  if(rd.id===2&&boss.shatters&&boss.shatters.length){
    boss.shatters.forEach(s=>{
      const frac=1-s.warn/1.3;
      const sx=s.c*CS,sy=GY+s.r*CS;
      const flick=Math.sin(Date.now()/80)*0.4+0.6;
      g.fillStyle=`rgba(180,0,0,${0.12+frac*0.2*flick})`;g.fillRect(sx,sy,CS,CS);
      g.strokeStyle=`rgba(255,60,0,${0.4+frac*0.5})`;g.lineWidth=1.5;g.strokeRect(sx+0.5,sy+0.5,CS-1,CS-1);
    });
  }

  // ── Malgath — Entropy Bolt warning circles ──
  if(rd.id===2)boss.meteors.forEach(m=>{
    const frac=1-m.warn/1.6;
    const mx=m.c*CS+CS/2,my=GY+m.r*CS+CS/2;
    const r2=CS*(0.4+frac*2.2);
    // Outer danger ring
    g.strokeStyle=`rgba(255,80,0,${0.25+frac*0.6})`;g.lineWidth=2;
    g.beginPath();g.arc(mx,my,r2,0,Math.PI*2);g.stroke();
    // Fill glow
    g.fillStyle=`rgba(255,50,0,${frac*0.12})`;
    g.beginPath();g.arc(mx,my,r2,0,Math.PI*2);g.fill();
    // Inner crosshair
    if(frac>0.5){
      g.strokeStyle=`rgba(255,200,0,${(frac-0.5)*1.6})`;g.lineWidth=1;
      g.beginPath();g.moveTo(mx-8,my);g.lineTo(mx+8,my);g.stroke();
      g.beginPath();g.moveTo(mx,my-8);g.lineTo(mx,my+8);g.stroke();
    }
  });

  // ── Kil'jaeden — Darkness overlay ──
  if(rd.id===2&&boss.darkActive>0){
    const fade=Math.min(1,boss.darkActive/0.6);
    g.fillStyle=`rgba(0,0,0,${0.88*fade})`;g.fillRect(0,GY,W,ROWS*CS);
    // Show countdown
    g.fillStyle=`rgba(255,50,0,${fade*0.9})`;g.font='bold 10px system-ui,-apple-system,sans-serif';g.textAlign='center';
    g.fillText('DARKNESS  '+boss.darkActive.toFixed(1)+'s',W/2,GY+16);
    // Still draw boss glow through darkness
    g.fillStyle=`rgba(${hexRGB(rd.bossGlow)},${0.3*fade})`;g.fillRect(bx,by,bw,bh);
    g.strokeStyle=rd.bossGlow;g.lineWidth=2;g.strokeRect(bx,by,bw,bh);
  }

  // ── Seraphox — Frost Lock rows/cols ──
  if(rd.id===3){
    boss.frostRows.forEach(fr=>{
      const fade=Math.min(1,fr.life/0.5);
      if(fr.type==='row'){
        g.fillStyle=`rgba(136,221,255,${0.12*fade})`;g.fillRect(0,GY+fr.idx*CS,W,CS);
        g.strokeStyle=`rgba(136,221,255,${0.5*fade})`;g.lineWidth=1.5;
        g.beginPath();g.moveTo(0,GY+fr.idx*CS);g.lineTo(W,GY+fr.idx*CS);g.stroke();
        g.beginPath();g.moveTo(0,GY+(fr.idx+1)*CS);g.lineTo(W,GY+(fr.idx+1)*CS);g.stroke();
      } else {
        g.fillStyle=`rgba(136,221,255,${0.12*fade})`;g.fillRect(fr.idx*CS,GY,CS,ROWS*CS);
        g.strokeStyle=`rgba(136,221,255,${0.5*fade})`;g.lineWidth=1.5;
        g.beginPath();g.moveTo(fr.idx*CS,GY);g.lineTo(fr.idx*CS,GY+ROWS*CS);g.stroke();
        g.beginPath();g.moveTo((fr.idx+1)*CS,GY);g.lineTo((fr.idx+1)*CS,GY+ROWS*CS);g.stroke();
      }
    });
    boss.crystals.forEach(cr=>{
      const wx=cr.c*CS+CS/2,wy=GY+cr.r*CS+CS/2;
      const warnPct=cr.warn>0?cr.warn/0.8:0;
      g.fillStyle=`rgba(136,221,255,${0.18+warnPct*0.3})`;
      g.beginPath();
      // Diamond shape
      g.moveTo(wx,wy-CS*0.4);g.lineTo(wx+CS*0.3,wy);g.lineTo(wx,wy+CS*0.4);g.lineTo(wx-CS*0.3,wy);
      g.closePath();g.fill();
      g.strokeStyle=`rgba(200,240,255,0.8)`;g.lineWidth=1;g.stroke();
    });
  }

  // ── Solrath — Pillar warnings ──
  if(rd.id===4){
    boss.pillars.forEach(p=>{
      const frac=1-p.warn/1.8;
      const px=p.c*CS,py=GY+p.r*CS;
      g.fillStyle=`rgba(255,100,0,${0.15+frac*0.25})`;g.fillRect(px,py,CS,CS);
      g.strokeStyle=`rgba(255,150,0,${0.5+frac*0.4})`;g.lineWidth=2;g.strokeRect(px,py,CS,CS);
      // Fire particle visual
      g.fillStyle=`rgba(255,220,0,${frac*0.8})`;g.font='bold 10px monospace';g.textAlign='center';
      g.fillText('▲',px+CS/2,py+CS/2+4);
    });
  }

  // ── Nyxtherion — Phase Walk overlay, bloom seeds, cascade ──
  if(rd.id===5){
    // Phase walk — boss flickers
    if(boss.phaseWalkActive>0){
      const ph=Math.sin(Date.now()/60)*0.5+0.5;
      g.fillStyle=`rgba(170,100,255,${0.06*ph})`;g.fillRect(0,GY,W,ROWS*CS);
    }
    // Bloom seeds — pulsing void overlay (cells are voided not devoured, so they restore)
    boss.bloomSeeds.forEach(seed=>{
      const lifeFrac=seed.life/8;
      const pulse=(Math.sin(Date.now()/120)*0.3+0.7)*lifeFrac;
      seed.cells.forEach(({r,c})=>{
        g.fillStyle=`rgba(120,40,220,${0.45*pulse})`;g.fillRect(c*CS,GY+r*CS,CS,CS);
        g.strokeStyle=`rgba(200,120,255,${0.6*pulse})`;g.lineWidth=1;
        g.strokeRect(c*CS+1,GY+r*CS+1,CS-2,CS-2);
      });
    });
    // Cascade spiral
    if(boss.cascadeActive>0){
      g.fillStyle='rgba(170,100,255,0.12)';g.fillRect(0,GY,W,ROWS*CS);
    }
  }

  // ── Devour progress bar (bottom of grid) ──
  const devFrac=boss.devouredCount/Math.max(1,boss.totalTraversable);
  const barY=GY+ROWS*CS-3,barW=W;
  g.fillStyle='#0a0008';g.fillRect(0,barY,barW,3);
  const barCol=devFrac>0.8?TX.bad:devFrac>0.5?TX.warn:rd.bossCol;
  g.fillStyle=barCol;g.fillRect(0,barY,Math.round(barW*devFrac),3);
}

// ── RAID SELECT ───────────────────────────────────────────────────────────────
function drawraidselect(){
  g.fillStyle='#07070e';g.fillRect(0,0,W,H);btns=[];
  const totalStars=campaignStars.reduce((s,n)=>s+n,0);
  const t=Date.now()/1000;

  // ── Header ──
  g.textAlign='center';
  g.fillStyle='#cc44ff';g.font=F(18,true);g.fillText('\u2694 RAIDS',W/2,28);
  g.fillStyle=TX.dim;g.font=FS(9,false);
  g.fillText('High-difficulty encounters. Boss entities devour the substrate.',W/2,42);
  g.fillStyle=TX.warn;g.font=FS(8,false);
  g.fillText('Campaign stars: '+totalStars+' / 24',W/2,55);

  // ── Back button ──
  g.fillStyle='#0a0a18';g.fillRect(8,6,100,24);
  g.strokeStyle='#2a2458';g.lineWidth=0.8;g.strokeRect(8,6,100,24);
  g.fillStyle=TX.dim;g.font=F(9,false);g.textAlign='center';g.fillText('\u25c4 BACK',58,21);
  mkbtn(8,6,100,24,()=>{gs='title';});

  // ── Dynamic card layout — split available height evenly ──
  const bx=12,bw=W-24;
  const headerH=62,footerH=0;
  const totalGap=4*(RAID_DEFS.length-1);
  const bh=Math.floor((H-headerH-footerH-totalGap)/RAID_DEFS.length);

  RAID_DEFS.forEach((rd,i)=>{
    const unlk=raidUnlocked[i];
    const done=raidCompleted[i];
    const by=headerH+i*(bh+4);

    // ── Card background with per-raid gradient identity ──
    g.fillStyle=unlk?rd.bossDark:'#080810';g.fillRect(bx,by,bw,bh);

    if(unlk){
      // Radial gradient from top-left — each raid has unique personality
      const bgGrad=g.createRadialGradient(bx+bw*0.15,by+bh*0.5,0,bx+bw*0.5,by+bh*0.5,bw*0.7);
      bgGrad.addColorStop(0,rd.bossDark.replace(')',',0.9)').replace('rgb','rgba')||rd.bossDark);
      bgGrad.addColorStop(0.5,`rgba(${hexRGB(rd.bossCol)},0.06)`);
      bgGrad.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=bgGrad;g.fillRect(bx,by,bw,bh);

      // Per-raid Unicode texture pattern filling the right ~40% of card
      const texX=bx+bw*0.55,texW=bw*0.42;
      g.save();g.beginPath();g.rect(texX,by,texW,bh);g.clip();
      g.fillStyle=`rgba(${hexRGB(rd.bossGlow)},0.045)`;
      g.font='10px monospace';g.textAlign='left';
      const patterns=[
        ['░','▒','▓','█','▄','▀','◆','◇','▪','▫'],   // VORRAX — void/flame
        ['◉','◎','○','◌','◍','◐','◑','◒','◓','◔'],   // XORRATH — eye/beam
        ['╳','╬','╫','╪','┼','╂','╋','╊','╉','╈'],   // MALGATH — entropy
        ['❄','✦','✧','◈','⬡','⬢','◇','◆','▷','◁'],  // SERAPHOX — crystal/ice
        ['▲','△','▴','▵','◭','◮','⬆','⬇','⬈','⬉'],  // SOLRATH — fire/pillar
        ['⊛','⊙','⊚','⊗','⊘','⊖','⊕','⊜','○','●'],  // NYXTHERION — void/dream
      ];
      const pat=patterns[i%patterns.length]; // safe fallback via modulo
      const cols=Math.ceil(texW/11)+1;
      const rows2=Math.ceil(bh/13)+1;
      for(let pr=0;pr<rows2;pr++){
        for(let pc=0;pc<cols;pc++){
          const ch=pat[(pr*3+pc*7)%pat.length];
          const fade=0.3+0.5*((pc/cols));
          g.globalAlpha=fade*0.5;
          g.fillText(ch,texX+pc*11,by+pr*13+11);
        }
      }
      g.globalAlpha=1;g.restore();

      // Left accent bar
      const barGrad=g.createLinearGradient(bx,by,bx,by+bh);
      barGrad.addColorStop(0,rd.bossGlow);
      barGrad.addColorStop(0.5,rd.bossCol);
      barGrad.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=barGrad;g.fillRect(bx,by,4,bh);
    } else {
      g.fillStyle='#141420';g.fillRect(bx,by,4,bh);
    }

    g.strokeStyle=unlk?(done?TX.good:rd.bossCol):'#141420';
    g.lineWidth=unlk?1.5:0.5;g.strokeRect(bx,by,bw,bh);

    // ── Boss mini-grid — top right ──
    const csz=9,mgx=bx+bw-16-rd.bossW*csz,mgy=by+10;
    for(let dr=0;dr<rd.bossH;dr++)for(let dc=0;dc<rd.bossW;dc++){
      g.fillStyle=unlk?rd.bossDark:'#0a0a14';g.fillRect(mgx+dc*csz,mgy+dr*csz,csz-1,csz-1);
      g.strokeStyle=unlk?rd.bossCol:'#2a2440';g.lineWidth=0.5;g.strokeRect(mgx+dc*csz,mgy+dr*csz,csz-1,csz-1);
    }
    // Animate the mini-grid pulse
    if(unlk){
      const pulse=(Math.sin(t*2.2+i*1.5)+1)*0.5;
      g.fillStyle=`rgba(${hexRGB(rd.bossGlow)},${0.12*pulse})`;
      g.fillRect(mgx,mgy,rd.bossW*csz,rd.bossH*csz);
    }
    g.fillStyle=unlk?rd.bossGlow:'#2a2440';g.font='bold 7px monospace';g.textAlign='center';
    g.fillText(rd.bossW+'×'+rd.bossH,mgx+rd.bossW*csz/2,mgy+rd.bossH*csz+10);

    // ── Text content — compact layout for 91px cards ──
    const tx=bx+18;
    const stripH=26; // bottom button strip height
    const stripY=by+bh-stripH;

    // Row 1: Number + Name (bold, glow)
    g.fillStyle=unlk?rd.bossGlow:TX.faint;
    g.font='bold 12px system-ui,-apple-system,sans-serif';g.textAlign='left';
    g.fillText((i+1)+'. '+rd.name,tx,by+14);

    // Row 1b: Title + lore — same line, italic title, dim lore after dash
    g.fillStyle=unlk?TX.dim:TX.faint;
    g.font='italic 8px system-ui,-apple-system,sans-serif';
    const loreAvailW=bw-40-(rd.bossW*csz+20);
    const titleStr=rd.title+' — '+rd.lore;
    // Truncate to fit
    let titleDisp=titleStr;
    while(titleDisp.length>4&&g.measureText(titleDisp).width>loreAvailW)titleDisp=titleDisp.slice(0,-4)+'…';
    g.fillText(titleDisp,tx,by+25);

    // Rows 2+: Abilities — compact, one per line, name+desc inline
    const abilityLineH=12;
    const abilityZoneH=stripY-(by+30)-2;
    const maxAbils=Math.floor(abilityZoneH/abilityLineH);
    rd.abilities.slice(0,maxAbils).forEach((ab,ai)=>{
      const ay=by+30+ai*abilityLineH+10;
      g.fillStyle=unlk?rd.bossGlow:TX.faint;
      g.font='bold 7.5px system-ui,-apple-system,sans-serif';g.textAlign='left';
      g.fillText('▶',tx,ay);
      g.fillStyle=unlk?'#c0d8f0':TX.faint;
      g.font='7.5px system-ui,-apple-system,sans-serif';
      // Name + desc on same line, truncated
      const abLine=ab+' — '+rd.abilityDescs[ai];

// ── MUSIC ENGINE ──────────────────────────────────────────────────────────────
function playSeamSound(){
  if(!music.ctx||music._muted)return;
  try{
    const ac=music.ctx,t=ac.currentTime;
    // Quick ascending arp — seam topology chime
    [[_N.E5,0],[_N.G5,0.06],[_N.B5,0.12],[_N.E6,0.18]].forEach(([f,d])=>{
      const o=ac.createOscillator(),env=ac.createGain();
      o.connect(env);env.connect(ac.destination);
      o.type='triangle';o.frequency.setValueAtTime(f,t+d);
      env.gain.setValueAtTime(0,t+d);env.gain.linearRampToValueAtTime(0.12,t+d+0.02);
      env.gain.linearRampToValueAtTime(0,t+d+0.18);
      o.start(t+d);o.stop(t+d+0.2);
    });
  }catch(e){}
}

function playCollectSound(freq){
  if(!music.ctx||music._muted)return;
  try{
    const ac=music.ctx,t=ac.currentTime;
    const o=ac.createOscillator(),env=ac.createGain();
    o.connect(env);env.connect(ac.destination);
    o.type='sine';
    o.frequency.setValueAtTime(freq||660,t);
    o.frequency.linearRampToValueAtTime((freq||660)*1.5,t+0.09);
    env.gain.setValueAtTime(0.18,t);env.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.start(t);o.stop(t+0.22);
  }catch(e){}
}

function playBombSound(){
  if(!music.ctx||music._muted)return;
  try{
    const ac=music.ctx,t=ac.currentTime;
    const buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*0.35),ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const ns=ac.createBufferSource(),ng=ac.createGain();
    ns.buffer=buf;ns.connect(ng);ng.connect(ac.destination);
    ng.gain.setValueAtTime(0.28,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    ns.start(t);ns.stop(t+0.35);
    const o=ac.createOscillator(),env=ac.createGain();
    o.connect(env);env.connect(ac.destination);
    o.type='sawtooth';o.frequency.setValueAtTime(180,t);
    o.frequency.exponentialRampToValueAtTime(40,t+0.2);
    env.gain.setValueAtTime(0.2,t);env.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.start(t);o.stop(t+0.22);
  }catch(e){}
}

function playUnlockSound(){
  if(!music.ctx||music._muted)return;

const music={
  ctx:null,nodes:[],playing:false,current:null,vol:0.38,_v:0,_muted:false,
  init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended'&&!this._muted)this.ctx.resume();},
  stop(){this._v++;this.playing=false;this.current=null;this.nodes.forEach(n=>{try{n.stop(0);}catch(e){}});this.nodes=[];},
  play(id){this.init();if(this.current===id&&this.playing)return;this.stop();this.current=id;this.playing=true;if(MTRACKS[id])MTRACKS[id]();},
  pause(){if(this.ctx&&this.ctx.state==='running')this.ctx.suspend();},
  resume(){if(this._muted)return;if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},
  toggleMute(){
    this._muted=!this._muted;
    if(this._muted){if(this.ctx&&this.ctx.state==='running')this.ctx.suspend();}
    else{if(this.ctx&&this.ctx.state==='suspended'&&gs!=='paused')this.ctx.resume();}
  },
  noteNode(freq,wave,vol,t,dur){
    const ac=this.ctx,osc=ac.createOscillator(),env=ac.createGain(),mv=ac.createGain();
    osc.connect(env);env.connect(mv);mv.connect(ac.destination);
    osc.type=wave;osc.frequency.setValueAtTime(freq,t);mv.gain.setValueAtTime(this.vol*vol,t);
    const att=Math.min(0.018,dur*0.08),rel=Math.min(0.055,dur*0.15);
    const hold=Math.max(t+att,t+dur*0.88-rel);
    env.gain.setValueAtTime(0,t);env.gain.linearRampToValueAtTime(1,t+att);
    env.gain.setValueAtTime(1,hold);env.gain.linearRampToValueAtTime(0,t+dur*0.95);
    osc.start(t);osc.stop(t+dur+0.02);this.nodes.push(osc);
  }
};

function mschedV(seq,bpm,wave,vol,t0,tid,v){
  if(!music.playing||music.current!==tid||music._v!==v)return; // stale — a stop() happened
  const ac=music.ctx,bd=60/bpm;
  const total=seq.reduce((s,[,b])=>s+b,0)*bd;
  let t=t0;
  seq.forEach(([freq,beats])=>{if(freq>0)music.noteNode(freq,wave,vol,t,beats*bd*0.91);t+=beats*bd;});
  const next=t0+total,cv2=v;
  setTimeout(()=>{if(music.playing&&music.current===tid&&music._v===cv2)mschedV(seq,bpm,wave,vol,next,tid,cv2);},(next-ac.currentTime-0.14)*1000);
}

function mplay(tid,...voices){
  const ac=music.ctx,st=ac.currentTime+0.06,v=music._v;
  voices.forEach(([seq,bpm,wave,vol])=>mschedV(seq,bpm,wave,vol,st,tid,v));
}

function playDmgSound(){
  if(!music.ctx||music._muted)return;
  try{
    const ac=music.ctx,t=ac.currentTime;
    // Descending sawtooth hit
    const osc=ac.createOscillator(),g2=ac.createGain();
    osc.connect(g2);g2.connect(ac.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(380,t);
    osc.frequency.exponentialRampToValueAtTime(95,t+0.14);
    g2.gain.setValueAtTime(0.22,t);
    g2.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    osc.start(t);osc.stop(t+0.16);
    // Short noise burst
    const buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*0.08),ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const ns=ac.createBufferSource(),ng=ac.createGain();
    ns.buffer=buf;ns.connect(ng);ng.connect(ac.destination);
    ng.gain.setValueAtTime(0.14,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    ns.start(t);ns.stop(t+0.08);
  }catch(e){}
}

function drawGem(cx,cy,r,def,lit){
  const pr=(h,f)=>parseInt(h.slice(1+f*2,3+f*2),16);
  const darken=(h,f)=>'rgb('+[0,1,2].map(i=>Math.floor(pr(h,i)*f)).join(',')+')';
  const lighten=(h,c)=>'rgba('+[0,1,2].map(i=>Math.min(255,Math.floor(pr(h,i)*1.5+c))).join(',')+',0.7)';
  // shadow
  g.fillStyle=def.dk;
  g.beginPath();gemOct(cx+1.5,cy+1.5,r);g.fill();
  // body
  g.fillStyle=lit?lighten(def.col,60):def.col;
  g.beginPath();gemOct(cx,cy,r);g.fill();
  // error flash
  if(gemError>0){
    g.fillStyle='rgba(255,60,60,'+(gemError*0.5)+')';
    g.beginPath();gemOct(cx,cy,r);g.fill();
  }
  // inner bevel
  g.fillStyle=def.hi.replace('#','rgba(').replace(/(..)(..)(..)$/,(_,r2,g2,b2)=>`${parseInt(r2,16)},${parseInt(g2,16)},${parseInt(b2,16)},0.35)`);
  g.beginPath();gemOct(cx,cy,r*0.68);g.fill();
  // highlight sparkle
  g.fillStyle='rgba(255,255,255,'+(lit?0.92:0.40)+')';
  g.beginPath();g.arc(cx-r*0.22,cy-r*0.24,r*(lit?0.22:0.14),0,Math.PI*2);g.fill();
}

function gemOct(cx,cy,r){
  const s=r*0.45;
  g.moveTo(cx-s,cy-r);g.lineTo(cx+s,cy-r);
  g.lineTo(cx+r,cy-s);g.lineTo(cx+r,cy+s);
  g.lineTo(cx+s,cy+r);g.lineTo(cx-s,cy+r);
  g.lineTo(cx-r,cy+s);g.lineTo(cx-r,cy-s);
  g.closePath();
}

document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&gs!=='naming')e.preventDefault();
  // ── NAMING SCREEN ──
  if(gs==='naming'){
    if(e.key==='Enter'){confirmName();return;}
    if(e.key==='Backspace'){nameInput=nameInput.slice(0,-1);return;}
    if(e.key.length===1&&nameInput.length<12&&/^[a-zA-Z0-9\-_ ]$/.test(e.key)){
      nameInput+=e.key;return;
    }
    return;
  }
  if(gs==='title'){
    checkUnlockSeq(e.key);
    if(!music.playing)music.play('title'); // only start if nothing is playing yet
    if(e.key===' '||e.key==='Enter'){if(gameMode==='campaign'){gs='levelselect';music.play('levelselect');}else startFreeplay();}
    return;
  }
  if(gs==='burrow'){
    if(e.key==='Escape'){gs='title';music.play('title');}
    return;
  }
  if(gs==='levelselect'){
    if(e.key==='Escape'){gs='title';music.play('title');}
    return;
  }
  if(gs==='raidselect'){
    if(e.key==='Escape'){gs='title';}
    return;
  }
  if(gs==='end'){
    if(e.key===' '||e.key==='Enter'){
      if(raidMode){gs='raidselect';raidMode=false;currentRaid=null;gameMode='solo';music.play('title');}
      else if(activeGameMode==='campaign'){gs='levelselect';music.play('levelselect');}
      else{gs='title';music.play('title');}
      document.getElementById('hint').textContent='';
    }return;
  }
  if(e.key==='Escape'){
    if(gs==='brief'){gs='title';music.stop();music.play('title');scrollY=0;return;}
    if(gs==='playing'){gs='paused';music.pause();}
    else if(gs==='paused'){gs='playing';music.resume();}
    return;
  }
  if(gs==='countdown'){
    const dir=WASD[e.key]!==undefined?WASD[e.key]:ARRS[e.key];
    if(dir!==undefined&&countdown<=2&&countdown>1){p1.boost=2.5;if(gameMode==='2p'&&ARRS[e.key]!==undefined)p2.boost=2.5;}
    return;
  }
  if(gs!=='playing')return;
  // Manual curl — Space triggers proactive curl (2s, invulnerable, shorter than forced)
  // Does NOT reset stag — the capture threat resumes when they uncurl
  if(e.key===' '&&!p1.curled&&!p1.stunned&&p1.cw>0.15){
    p1.curled=true;p1.curlT=2.0;p1.curlManual=true;
    sm='\u25cf MANUAL CURL \u2014 INVULNERABLE';smt=1.2;

  }
  const steer=(w,nd)=>{if(nd===undefined||w.curled||w.stunned>0)return;const op=(w.dir+2)%4;if(nd!==op)w.qd=nd;};
  if(gameMode==='2p'){steer(p1,WASD[e.key]);steer(p2,ARRS[e.key]);}
  else steer(p1,WASD[e.key]!==undefined?WASD[e.key]:ARRS[e.key]);
});

const bgc=document.getElementById('bgc');
const bgx=bgc.getContext('2d');
let bgW=0,bgH=0;

function resizeBg(){
  bgW=bgc.width=window.innerWidth;
  bgH=bgc.height=window.innerHeight;
}
resizeBg();
let canvasScale=1; // tracks current CSS scale for render transform

function scaleCanvas(){
  const dpr=window.devicePixelRatio||1;
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  const isPortrait=window.innerHeight>window.innerWidth;
  let scale;
  if(isTouch&&isPortrait){
    // Canvas gets at most 56% of screen height, full width — whichever is tighter
    const maxCanvasH=window.innerHeight*0.56;
    const scaleByW=window.innerWidth/W;
    const scaleByH=maxCanvasH/H;
    scale=Math.min(scaleByW,scaleByH);
  } else {
    const scaleX=(window.innerWidth*0.96)/W;
    const scaleY=(window.innerHeight*0.94)/H;
    scale=Math.min(scaleX,scaleY,2.0);
  }
  canvasScale=scale;
  cv.style.width=Math.round(W*scale)+'px';
  cv.style.height=Math.round(H*scale)+'px';
  cv.width=Math.round(W*scale*dpr);
  cv.height=Math.round(H*scale*dpr);
}
scaleCanvas();
window.addEventListener('resize',()=>{resizeBg();scaleCanvas();});

function mkPart(){
  return {
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    sz:Math.random()<0.65?2:Math.random()<0.85?3:5,
    spd:0.08+Math.random()*0.35,
    drift:(Math.random()-0.5)*0.12,
    op:0.04+Math.random()*0.18,
    phase:Math.random()*Math.PI*2,
  };
}
function mkShot(){
  const ang=-0.35+Math.random()*0.35; // mostly rightward, slight downward
  const spd=6+Math.random()*10;
  return {
    x:Math.random()*window.innerWidth*0.6,
    y:Math.random()*window.innerHeight*0.7,
    vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    len:40+Math.random()*80,
    life:1,decay:0.018+Math.random()*0.025,
  };
}

const PARTS=Array.from({length:90},mkPart);
const SHOTS=[];
let lastShot=0;

function drawBg(now,r,gr,b){
  if(!bgx||bgW===0)return;
  // Fade trail
  bgx.fillStyle='rgba(7,7,14,0.35)';
  bgx.fillRect(0,0,bgW,bgH);

  const t=now/1000;

  // Drifting space blocks
  PARTS.forEach(p=>{
    p.y-=p.spd;
    p.x+=p.drift;
    if(p.y<-8){p.y=bgH+4;p.x=Math.random()*bgW;}
    if(p.x<-8||p.x>bgW+8)p.x=((p.x%bgW)+bgW)%bgW;
    const pulse=0.7+0.3*Math.sin(t*1.2+p.phase);
    bgx.globalAlpha=p.op*pulse;
    bgx.fillStyle=`rgb(${r},${gr},${b})`;
    bgx.fillRect(Math.round(p.x),Math.round(p.y),p.sz,p.sz);
  });

  // Shooting streaks
  if(now-lastShot>1800+Math.random()*5000){lastShot=now;SHOTS.push(mkShot());}
  for(let i=SHOTS.length-1;i>=0;i--){
    const s=SHOTS[i];
    s.life-=s.decay;
    if(s.life<=0){SHOTS.splice(i,1);continue;}
    s.x+=s.vx;s.y+=s.vy;
    const mag=Math.hypot(s.vx,s.vy);
    const tx=s.x-s.vx/mag*s.len,ty=s.y-s.vy/mag*s.len;
    // Head glow
    bgx.globalAlpha=s.life*0.85;
    bgx.strokeStyle=`rgba(${r},${gr},${b},${s.life})`;
    bgx.lineWidth=1.5;
    bgx.beginPath();bgx.moveTo(s.x,s.y);bgx.lineTo(tx,ty);bgx.stroke();
    // Soft outer glow
    bgx.globalAlpha=s.life*0.22;
    bgx.strokeStyle=`rgba(${r},${gr},${b},${s.life*0.5})`;
    bgx.lineWidth=4;
    bgx.beginPath();bgx.moveTo(s.x,s.y);bgx.lineTo(tx,ty);bgx.stroke();
    // Tiny sparkle at head
    bgx.globalAlpha=s.life;
    bgx.fillStyle=`rgba(255,255,255,${s.life*0.8})`;
    bgx.fillRect(Math.round(s.x)-1,Math.round(s.y)-1,2,2);
  }
  bgx.globalAlpha=1;
}

function updateBorderAnim(now){
  const t=now/1000;
  const pal=getBorderPalette();
  const p=(Math.sin(t*1.4)+1)/2;
  const p2=(Math.sin(t*2.8+1)+1)/2;
  const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
  const seg=p<0.5?[pal[0],pal[1],p*2]:[pal[1],pal[2],(p-0.5)*2];
  const r=lerp(seg[0][0],seg[1][0],seg[2]);
  const gr=lerp(seg[0][1],seg[1][1],seg[2]);
  const b=lerp(seg[0][2],seg[1][2],seg[2]);
  const glow=Math.round(10+p2*18);
  const alpha=(0.45+p2*0.4).toFixed(2);
  cv.style.borderColor=`rgb(${r},${gr},${b})`;
  cv.style.boxShadow=`0 0 ${glow}px rgba(${r},${gr},${b},${alpha}), inset 0 0 ${Math.round(glow*0.4)}px rgba(${r},${gr},${b},0.12)`;
  drawBg(now,r,gr,b);
}

function loop(now){
  try{update(now);}catch(e){console.error('DGTH update error:',e);if(gs==='playing'){gs='end';er='ERROR: '+e.message;}}
  try{updateBorderAnim(now);}catch(e){console.error('DGTH border error:',e);}
  try{render();}catch(e){console.error('DGTH render error:',e);}
  updateMobileUI();
  requestAnimationFrame(loop);
}
loadSave(); // hydrate state from localStorage before first frame
// First launch — show naming screen if no character name yet
if(!save.characterName){gs='naming';}
requestAnimationFrame(loop);

// ── MOBILE CONTROLS ───────────────────────────────────────────────────────────
// IS_TOUCH and IS_PORTRAIT() are defined at top of script

// Steer P1 (only player on mobile)
function steerP1(nd){
  if(nd===undefined||p1.curled||p1.stunned>0)return;
  const op=(p1.dir+2)%4;if(nd!==op)p1.qd=nd;
}
function steerP2(nd){
  if(nd===undefined||p2.curled||p2.stunned>0)return;
  const op=(p2.dir+2)%4;if(nd!==op)p2.qd=nd;
}

// ── THUMBSTICK ────────────────────────────────────────────────────────────────
const stickOuter=document.getElementById('stick-outer');
const stickNub=document.getElementById('stick-nub');
const stickArcCv=document.getElementById('stick-arc');

let stickActive=false;
let stickOriginX=0,stickOriginY=0;   // center of outer ring in page coords
let stickCurDir=-1;                   // current snapped direction (-1 = none)
const STICK_DEAD=0.18;               // deadzone fraction of outer radius
const STICK_MAX=0.42;                // nub travel as fraction of outer radius

function getStickRadius(){
  return stickOuter?stickOuter.offsetWidth/2:80;
}

function snapDir(dx,dy){
  // Deadzone check
  const r=getStickRadius();
  const dist=Math.hypot(dx,dy);
  if(dist/r<STICK_DEAD)return -1;
  // Snap to cardinal: whichever axis has greater magnitude wins
  return Math.abs(dx)>Math.abs(dy)?(dx>0?1:3):(dy>0?2:0);
}

function moveNub(dx,dy){
  if(!stickNub)return;
  const r=getStickRadius();
  const dist=Math.hypot(dx,dy);
  const travel=Math.min(dist,r*STICK_MAX);
  const angle=Math.atan2(dy,dx);
  const nx=Math.cos(angle)*travel;
  const ny=Math.sin(angle)*travel;
  stickNub.style.transform=`translate(calc(-50% + ${nx.toFixed(1)}px), calc(-50% + ${ny.toFixed(1)}px))`;
}

function resetNub(){
  if(!stickNub)return;
  stickNub.style.transform='translate(-50%,-50%)';
  stickNub.classList.remove('active');
  drawArc(-1);
  stickCurDir=-1;
}

// Draw a glowing arc segment indicating the current direction
function drawArc(dir){
  if(!stickArcCv)return;
  const el=stickOuter;
  if(!el)return;
  const sz=el.offsetWidth;
  stickArcCv.width=sz*2;stickArcCv.height=sz*2; // 2x for crispness
  const ac=stickArcCv.getContext('2d');
  ac.clearRect(0,0,sz*2,sz*2);
  if(dir<0)return;
  const cx=sz,cy=sz,rad=sz*0.82;
  // Arc spans 70° centered on the direction
  const baseAngles=[Math.PI*1.5,0,Math.PI*0.5,Math.PI]; // up, right, down, left
  const base=baseAngles[dir];
  const span=Math.PI*(70/180);
  ac.beginPath();
  ac.arc(cx,cy,rad,base-span/2,base+span/2);
  const grad=ac.createLinearGradient(0,0,sz*2,sz*2);
  grad.addColorStop(0,'rgba(91,200,245,0.0)');
  grad.addColorStop(0.5,'rgba(91,200,245,0.5)');
  grad.addColorStop(1,'rgba(91,200,245,0.0)');
  ac.strokeStyle=grad;
  ac.lineWidth=sz*0.12;
  ac.lineCap='round';
  ac.stroke();
}

function onStickStart(e){
  e.preventDefault();
  if(!stickOuter)return;
  stickActive=true;
  stickNub.classList.add('active');
  const rect=stickOuter.getBoundingClientRect();
  stickOriginX=rect.left+rect.width/2;
  stickOriginY=rect.top+rect.height/2;
  onStickMove(e);
}

function onStickMove(e){
  e.preventDefault();
  if(!stickActive)return;
  const t=e.changedTouches?e.changedTouches[0]:e.touches[0];
  if(!t)return;
  const dx=t.clientX-stickOriginX;
  const dy=t.clientY-stickOriginY;
  moveNub(dx,dy);
  const dir=snapDir(dx,dy);
  if(dir!==stickCurDir){
    stickCurDir=dir;
    drawArc(dir);
    if(dir>=0&&(gs==='playing'||gs==='countdown'))steerP1(dir);
  }
}

function onStickEnd(e){
  e.preventDefault();
  stickActive=false;
  resetNub();
}

if(stickOuter){
  stickOuter.addEventListener('touchstart',onStickStart,{passive:false});
  stickOuter.addEventListener('touchmove',onStickMove,{passive:false});
  stickOuter.addEventListener('touchend',onStickEnd,{passive:false});
  stickOuter.addEventListener('touchcancel',onStickEnd,{passive:false});
}
// ── END THUMBSTICK ────────────────────────────────────────────────────────────

// ── SWIPE on canvas ───────────────────────────────────────────────────────────
let swipeStartX=0,swipeStartY=0,swipeActive=false;
const SWIPE_THRESH=22;
let swipeHintShown=false;
const swipeHintEl=document.getElementById('swipe-hint');

function showSwipeHint(){
  if(swipeHintShown||!swipeHintEl)return;
  swipeHintShown=true;
  swipeHintEl.style.display='flex';
  requestAnimationFrame(()=>{swipeHintEl.style.opacity='1';});
  setTimeout(()=>{
    swipeHintEl.style.opacity='0';
    setTimeout(()=>{swipeHintEl.style.display='none';},400);
  },1600);
}

cv.addEventListener('touchstart',e=>{
  if(e.touches.length!==1)return;
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
  swipeActive=true;
  if(gs==='playing'&&!swipeHintShown)showSwipeHint();
  if(gs==='countdown'&&countdown<=2&&countdown>1)p1.boost=4;
},{passive:true});

cv.addEventListener('touchend',e=>{
  if(!swipeActive)return;swipeActive=false;
  const dx=e.changedTouches[0].clientX-swipeStartX;
  const dy=e.changedTouches[0].clientY-swipeStartY;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx<SWIPE_THRESH&&ady<SWIPE_THRESH){
    // Short tap → route to menu button system
    const r=cv.getBoundingClientRect();
    const mx=(e.changedTouches[0].clientX-r.left)*(W/r.width);
    const my=(e.changedTouches[0].clientY-r.top)*(H/r.height);
    if(gs==='brief'){gs='title';music.stop();music.play('title');scrollY=0;return;}
    btns.forEach(b=>{if(mx>=b.x&&mx<b.x+b.w&&my>=b.y&&my<b.y+b.h)b.fn();});
    return;
  }
  if(gs!=='playing')return;
  let dir;
  if(Math.abs(dx)>Math.abs(dy)){dir=dx>0?1:3;}
  else{dir=dy>0?2:0;}
  steerP1(dir);
},{passive:true});

cv.addEventListener('touchmove',e=>{
  if(gs==='playing'||gs==='countdown')e.preventDefault();
},{passive:false});

// ── MINI HUD (portrait mobile) ────────────────────────────────────────────────
const mhudP1=document.getElementById('mhud-p1');
const mhudP2=document.getElementById('mhud-p2');
const mhudTimer=document.getElementById('mhud-timer');
const mobileHud=document.getElementById('mobile-hud');
const dpadWrap=document.getElementById('dpad-wrap');

function updateMobileUI(){
  if(!IS_TOUCH||!IS_PORTRAIT())return;
  const playing=gs==='playing'||gs==='countdown'||gs==='paused';

  // Show/hide dpad and mini-hud only during active game
  if(dpadWrap)dpadWrap.style.display=(playing||gs==='end')?'flex':'none';
  if(mobileHud)mobileHud.style.display=playing?'flex':'none';

  // Update mini-HUD values
  if(playing&&mhudP1&&mhudP2&&mhudTimer){
    mhudP1.textContent=p1.score.toLocaleString();
    if(gameMode!=='solo'){
      mhudP2.textContent=p2.score.toLocaleString();
      document.querySelector('#mobile-hud div:last-child .mhud-label').textContent=
        gameMode==='vsai'?'AI':'P2';
    } else {
      mhudP2.textContent='';
    }
    if(raidMode){
      const m=Math.floor(raidElapsed/60),s=Math.floor(raidElapsed%60).toString().padStart(2,'0');
      mhudTimer.textContent=m+':'+s;
    } else {
      const m=Math.floor(gt/60),s=Math.floor(gt%60).toString().padStart(2,'0');
      mhudTimer.textContent=m+':'+s;
    }
  }
}
