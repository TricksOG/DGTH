    g.fillStyle=unlk?TX.dim:'#2a2a3a';g.font=FS(10,false);
    g.fillText(lv.sub,tx,by+38);
    g.fillStyle=unlk?TX.body:'#2a2a3a';g.font=FS(9,false);
    g.fillText(lv.desc,tx,by+52);
    if(lv.event){
      const evLabel={scramble:'\u26a1 MID-MATCH FRACTURE AT 90s',isolate:'\u25a0 ISOLATION BOXES \u2014 OPEN AT 60s'}[lv.event.type];
      g.fillStyle=unlk?TX.warn:'#2a2a3a';g.font=FS(9,true);g.fillText(evLabel,tx,by+66);
    }

    // Stars
    for(let s=0;s<3;s++){
      g.fillStyle=s<stars?TX.warn:'#222';g.font='18px Arial';g.textAlign='left';
      g.fillText('\u2605',bx+bw-80+s*24,by+30);
    }

    // Star conditions
    g.fillStyle='#334';g.font=FS(8,false);g.textAlign='right';
    g.fillText('\u2605 Win  \u2605\u2605 '+lv.starCovers[0]+'%+ coverage  \u2605\u2605\u2605 '+lv.starCovers[1]+'%+ + no captures',bx+bw-12,by+70);

    if(unlk)mkbtn(bx,by,bw,bh,()=>startLevel(i));
    else{g.fillStyle='#334';g.font=F(10,true);g.textAlign='center';g.fillText('[LOCKED \u2014 COMPLETE PREVIOUS LEVEL]',bx+bw/2,by+44);}
  });

  // Back button
  g.fillStyle='#0a0a18';g.fillRect(32,H-48,120,32);
  g.strokeStyle='#2a2458';g.lineWidth=0.8;g.strokeRect(32,H-48,120,32);
  g.fillStyle=TX.dim;g.font=F(10,false);g.textAlign='center';g.fillText('\u25c4 BACK',92,H-28);
  mkbtn(32,H-48,120,32,()=>{gs='title';music.play('title');});
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function wstatus(w){
  if(w.stunned>0)return'\u26a1 STUNNED';if(w.boost>0)return'\u25b2 BOOST '+w.boost.toFixed(1)+'s';
  if(w.freeze>0)return'\u2744 FROZEN '+w.freeze.toFixed(1)+'s';if(w.scramble>0)return'\u2297 SCRBL '+w.scramble.toFixed(1)+'s';
  if(w.shield)return'\u25c9 SHIELD';return'';
}
function drawhud(){
  g.fillStyle=theme.hudBg||'#0a0a18';g.fillRect(0,0,W,GY);
  g.fillStyle=theme.hudLine||'#1e1a40';g.fillRect(0,GY-1,W,1);
  const m=Math.floor(gt/60),s=Math.floor(gt%60).toString().padStart(2,'0');
  const p1cov=Math.round(p1.vis.size/(COLS*ROWS)*100);
  const ac=theme.accent||C1;
  g.textAlign='left';
  g.fillStyle=p1.boost>0?TX.good:p1.stunned>0?'#888':C1;g.font=F(11,true);
  g.fillText('C1  '+(gameMode==='2p'?'P1':'YOU'),16,18);
  g.fillStyle=TX.dim;g.font=FS(9,false);g.fillText('SCORE',16,30);
  g.fillStyle=TX.head;g.font=F(15,true);g.fillText(p1.score.toLocaleString(),16,47);
  g.fillStyle=TX.dim;g.font=FS(9,false);g.fillText('COV:'+p1cov+'%  SEA:'+p1.sc+'  CAP:'+p1.fcc+'/3',16,60);
  const s1=wstatus(p1);
  if(s1){g.fillStyle=p1.boost>0?TX.good:TX.warn;g.font=FS(9,true);g.fillText(s1,16,73);}
  else if(p1.cw>0){g.fillStyle='#0c0c18';g.fillRect(16,68,82,4);g.fillStyle=p1.cw>0.65?TX.bad:TX.warn;g.fillRect(16,68,82*p1.cw,4);}

  g.textAlign='center';
  const tc=gt<30?TX.bad:gt<60?TX.warn:TX.head;
  if(!raidMode){
    g.fillStyle=TX.dim;g.font=FS(9,false);g.fillText('TIME',W/2,14);
    g.fillStyle=tc;g.font=F(19,true);g.fillText(m+':'+s,W/2,34);
  }
  const showP2=gameMode!=='solo';
  if(!raidMode&&showP2){const ah=p1.score>=p2.score;g.fillStyle=ah?C1:C2;g.font=F(8,true);g.fillText(ah?'C1 LEADING':'C2 LEADING',W/2,48);}
  if(!raidMode&&gameMode==='campaign'&&currentLevel){
    g.fillStyle=ac;g.font=F(8,true);g.fillText(currentLevel.name,W/2,showP2?60:48);
    const cfg=DIFF_CFG[difficulty];g.fillStyle=cfg.col;g.font=FS(8,false);g.fillText(difficulty,W/2,showP2?72:60);
  } else if(!raidMode) {
    const lv=leadScore();let nxt=0;for(let i=1;i<=3;i++){if(lv<UNLOCKS[i]){nxt=i;break;}}
    if(nxt>0){
      const prev=nxt>1?UNLOCKS[nxt-1]:0,prog=Math.max(0,(lv-prev)/(UNLOCKS[nxt]-prev));
      const bw=100,bx=W/2-50,by=56;
      g.fillStyle='#0a0a14';g.fillRect(bx,by,bw,4);g.fillStyle=LOCK_BDR[nxt];g.fillRect(bx,by,bw*prog,4);
      g.fillStyle=TX.dim;g.font=FS(8,false);g.textAlign='center';g.fillText('T'+nxt+': '+lv.toLocaleString()+'/'+UNLOCKS[nxt].toLocaleString(),W/2,74);
    } else {g.fillStyle=TX.good;g.font=FS(8,false);g.textAlign='center';g.fillText('\u25b2 ALL ZONES OPEN',W/2,72);}
  }
  if(showP2){
    const p2cov=Math.round(p2.vis.size/(COLS*ROWS)*100),lbl2=gameMode==='2p'?'P2':'AI';
    g.textAlign='right';
    g.fillStyle=p2.boost>0?TX.good:p2.stunned>0?'#888':C2;g.font=F(11,true);g.fillText('C2  '+lbl2,W-16,18);
    g.fillStyle=TX.dim;g.font=FS(9,false);g.fillText('SCORE',W-16,30);
    g.fillStyle=TX.head;g.font=F(15,true);g.fillText(p2.score.toLocaleString(),W-16,47);
    g.fillStyle=TX.dim;g.font=FS(9,false);g.fillText('CAP:'+p2.fcc+'/3  SEA:'+p2.sc+'  COV:'+p2cov+'%',W-16,60);
    const s2=wstatus(p2);
    if(s2){g.fillStyle=p2.boost>0?TX.good:TX.warn;g.font=FS(9,true);g.textAlign='right';g.fillText(s2,W-16,73);}
    else if(p2.cw>0){g.fillStyle='#0c0c18';g.fillRect(W-98,68,82,4);g.fillStyle=p2.cw>0.65?TX.bad:TX.warn;g.fillRect(W-98,68,82*p2.cw,4);}
  }
  // Isolation countdown
  if(!raidMode&&currentLevel&&currentLevel.event&&currentLevel.event.type==='isolate'&&!isolateOpen){
    const elapsed=180-gt,rem=Math.max(0,currentLevel.event.duration-elapsed);
    g.textAlign='center';g.fillStyle='#ff6060';g.font=F(8,true);
    g.fillText('ISOLATION DISSOLVES IN '+rem.toFixed(1)+'s',W/2,88);
  }
  // Raid HUD — boss name + elapsed + coverage (no HP here — HP is in bottom strip)
  if(raidMode&&currentRaid){
    const rd=currentRaid;
    if(p1.hp<=0){
      g.fillStyle='rgba(255,0,0,0.16)';g.fillRect(0,GY,W/2,ROWS*CS);
      g.fillStyle='rgba(255,80,80,0.7)';g.font='bold 9px Arial';g.textAlign='center';
      g.fillText('C1 FALLEN',W/4,GY+20);
    }
    if(gameMode!=='solo'&&p2.hp<=0){
      g.fillStyle='rgba(255,0,0,0.16)';g.fillRect(W/2,GY,W/2,ROWS*CS);
      g.fillStyle='rgba(255,80,80,0.7)';g.font='bold 9px Arial';g.textAlign='center';
      g.fillText('C2 FALLEN',W*3/4,GY+20);
    }
    // Boss name + elapsed — now has the whole center column to breathe
    g.textAlign='center';
    g.fillStyle=rd.bossGlow;g.font='bold '+Math.round(11*fs)+'px Courier New';
    g.fillText('\u2694 '+rd.name+' \u2694',W/2,26);
    const mins=Math.floor(raidElapsed/60),secs=Math.floor(raidElapsed%60).toString().padStart(2,'0');
    g.fillStyle=boss.enraged?TX.bad:TX.dim;g.font=FS(9,false);
    g.fillText((boss.enraged?'\u26a1 ENRAGE \u26a1  ':'ELAPSED  ')+mins+':'+secs,W/2,46);
    if(currentRaid.id===2&&boss.phase>1){
      g.fillStyle=['',TX.good,'#ff8800',TX.bad][boss.phase];g.font='bold 9px Arial';
      g.fillText('\u25b6 PHASE '+boss.phase,W/2,63);
    }
  }
  // Quit pill + Music toggle + Raid HP bars — bottom strip
  {const qbx=4,qby=GY-20,qbw=46,qbh=16;
  g.fillStyle='#1a0808';g.fillRect(qbx,qby,qbw,qbh);
  g.strokeStyle='#3a1a1a';g.lineWidth=0.7;g.strokeRect(qbx,qby,qbw,qbh);
  g.fillStyle='#aa4444';g.font=FS(8,false);g.textAlign='center';
  g.fillText('\u2715 QUIT',qbx+qbw/2,qby+11);
  mkbtn(qbx,qby,qbw,qbh,()=>{gs='paused';music.pause();});}
  // HP bars + coverage bar in raid mode
  if(raidMode){
    const hby=GY-20,hbh=16;
    // P1 HP
    const hp1=Math.max(0,p1.hp||0),hp1Pct=hp1/MAX_HP;
    const hc1=hp1>50?'#44ff88':hp1>25?TX.warn:TX.bad;
    const hbx1=56,hbw1=Math.min(140,W/2-70);
    g.fillStyle='#100010';g.fillRect(hbx1,hby,hbw1,hbh);
    g.fillStyle=hc1;g.fillRect(hbx1,hby,Math.round(hbw1*hp1Pct),hbh);
    g.fillStyle='rgba(0,0,0,0.45)';g.fillRect(hbx1,hby,hbw1,hbh);
    g.strokeStyle=hc1;g.lineWidth=1;g.strokeRect(hbx1,hby,hbw1,hbh);
    g.fillStyle=hp1>0?hc1:'#884444';g.font='bold 8px Courier New';g.textAlign='center';
    g.fillText(hp1>0?'C1 \u2665 '+hp1+'/'+MAX_HP:'C1 \u2020 FALLEN',hbx1+hbw1/2,hby+11);
    // Coverage bar — centered, same height as HP bars
    const WIN_HUD={NORMAL:0.68,HEROIC:0.74,MYTHIC:0.80,LEGENDARY:0.86};
    const winPct=WIN_HUD[difficulty]||0.74;
    const travLeft=Math.max(1,boss.totalTraversable-boss.devouredCount);
    const covNow=new Set([...p1.vis,...(gameMode!=='solo'?p2.vis:[])]).size;
    const covFrac=Math.min(1,covNow/travLeft);
    const cbx=W/2-65,cbw=130;
    const covCol=covFrac>=winPct?TX.good:covFrac>=winPct*0.75?TX.warn:C1;
    g.fillStyle='#080812';g.fillRect(cbx,hby,cbw,hbh);
    g.fillStyle=covCol;g.fillRect(cbx,hby,Math.round(cbw*covFrac),hbh);
    g.fillStyle='rgba(0,0,0,0.45)';g.fillRect(cbx,hby,cbw,hbh);
    g.strokeStyle=covCol;g.lineWidth=1;g.strokeRect(cbx,hby,cbw,hbh);
    g.fillStyle='#fff';g.fillRect(cbx+Math.round(cbw*winPct)-1,hby,2,hbh); // threshold tick
    g.fillStyle=covFrac>=winPct?TX.good:'#ccc';g.font='bold 8px Courier New';g.textAlign='center';
    g.fillText(Math.round(covFrac*100)+'% / '+Math.round(winPct*100)+'%',cbx+cbw/2,hby+11);
    // P2 HP (duo only)
    if(gameMode!=='solo'){
      const hp2=Math.max(0,p2.hp||0),hp2Pct=hp2/MAX_HP;
      const hc2=hp2>50?'#44ff88':hp2>25?TX.warn:TX.bad;
      const hbx2=W-52-6-Math.min(140,W/2-70),hbw2=Math.min(140,W/2-70);
      g.fillStyle='#100010';g.fillRect(hbx2,hby,hbw2,hbh);
      g.fillStyle=hc2;g.fillRect(hbx2,hby,Math.round(hbw2*hp2Pct),hbh);
      g.fillStyle='rgba(0,0,0,0.45)';g.fillRect(hbx2,hby,hbw2,hbh);
      g.strokeStyle=hc2;g.lineWidth=1;g.strokeRect(hbx2,hby,hbw2,hbh);
      g.fillStyle=hp2>0?hc2:'#884444';g.font='bold 8px Courier New';g.textAlign='center';
      g.fillText(hp2>0?'C2 \u2665 '+hp2+'/'+MAX_HP:'C2 \u2020 FALLEN',hbx2+hbw2/2,hby+11);
    }
  }
  // Music toggle — small pill in HUD bottom-right
  {const mOn=!music._muted,mbx=W-52,mby=GY-20,mbw=46,mbh=16;
  g.fillStyle=mOn?'#061206':'#120606';g.fillRect(mbx,mby,mbw,mbh);
  g.strokeStyle=mOn?'#1a401a':'#401a1a';g.lineWidth=0.7;g.strokeRect(mbx,mby,mbw,mbh);
  g.fillStyle=mOn?TX.good:TX.bad;g.font=FS(8,false);g.textAlign='center';
  g.fillText('\u266a '+(mOn?'ON':'OFF'),mbx+mbw/2,mby+11);
  mkbtn(mbx,mby,mbw,mbh,()=>music.toggleMute());}
}

// ── BOSS VISUALS ──────────────────────────────────────────────────────────────
function drawBoss(){
  if(!raidMode||!currentRaid)return;
  const rd=currentRaid;
  const t=Date.now()/1000;
  const bx=boss.gx*CS,by=GY+boss.gy*CS,bw=boss.w*CS,bh=boss.h*CS;

  // ── Attraction field rings ──
  const warnFlash=boss.attractWarn>0;
  const dmgFlash=boss.attractActive>0;
  for(let ring=1;ring<=boss.attractMax;ring++){
    const rx=bx-ring*CS,ry=by-ring*CS,rw=bw+ring*2*CS,rh=bh+ring*2*CS;
    let alpha=0,col='255,80,0';
    if(dmgFlash&&ring<=boss.attractRadius){alpha=0.55;col='255,160,30';}
    else if(warnFlash&&ring<=boss.attractRadius){alpha=0.3+0.3*Math.sin(t*18);col='255,80,0';}
    else if(ring<=boss.attractRadius){alpha=0.08+0.05*Math.sin(t*1.8+ring);}
    else{alpha=0.03;}
    if(alpha>0){
      g.strokeStyle=`rgba(${col||hexRGB(rd.bossGlow)},${alpha})`;
      g.lineWidth=dmgFlash&&ring<=boss.attractRadius?2.5:1;
      g.strokeRect(rx,ry,rw,rh);
      if(dmgFlash&&ring<=boss.attractRadius){
        g.fillStyle=`rgba(255,80,0,0.04)`;g.fillRect(rx,ry,rw,rh);
      }
    }
  }

  // ── Boss body ──
  const pulse=(Math.sin(t*2.2)+1)*0.5;
  g.fillStyle=rd.bossDark;g.fillRect(bx,by,bw,bh);
  // Inner glow pulse
  g.fillStyle=`rgba(${hexRGB(rd.bossGlow)},${0.06+pulse*0.12})`;g.fillRect(bx+1,by+1,bw-2,bh-2);
  // Border
  g.strokeStyle=rd.bossCol;g.lineWidth=1.8+pulse*0.8;g.strokeRect(bx,by,bw,bh);
  // Corner marks
  const cm=4;[[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([cx2,cy2])=>{
    g.strokeStyle=rd.bossGlow;g.lineWidth=1.5;
    g.beginPath();g.moveTo(cx2-(cx2>bx?cm:0),cy2);g.lineTo(cx2+(cx2===bx?cm:0),cy2);g.stroke();
    g.beginPath();g.moveTo(cx2,cy2-(cy2>by?cm:0));g.lineTo(cx2,cy2+(cy2===by?cm:0));g.stroke();
  });
  // Boss name
  const fsize=Math.max(7,Math.round(Math.min(bw,bh)*0.18));
  g.fillStyle=rd.bossGlow;g.font=`bold ${fsize}px Courier New`;g.textAlign='center';
  g.fillText(rd.name,bx+bw/2,by+bh/2+fsize*0.35);

  // ── Vorrax — Void Breath warning (3-cell wide) ──
  if(rd.id===0&&boss.dbWarn>0&&boss.dbDir){
    const fade=boss.dbWarn/1.4,flick=Math.sin(t*20)*0.4+0.6;
    g.strokeStyle=`rgba(255,140,0,${fade*0.9*flick})`;g.lineWidth=3;
    if(boss.dbDir.type==='row'){
      // 5-cell highlight: idx-2 through idx+2
      for(let o=-2;o<=2;o++){
        const ry2=GY+(boss.dbDir.idx+o)*CS;
        if(ry2<GY||ry2>=GY+ROWS*CS)continue;
        g.fillStyle=`rgba(255,${o===0?100:60},0,${fade*(o===0?0.14:0.06)*flick})`;
        g.fillRect(0,ry2,W,CS);
      }
      const dy2=GY+boss.dbDir.idx*CS+CS/2;
      g.beginPath();g.moveTo(0,dy2);g.lineTo(W,dy2);g.stroke();
      g.fillStyle=`rgba(255,180,0,${fade*0.8})`;g.font='bold 9px Arial';g.textAlign='right';
      g.fillText('VOID BREATH \xb13',W-4,dy2-3);
    } else {
      for(let o=-1;o<=1;o++){
        const rx2=(boss.dbDir.idx+o)*CS;
        if(rx2<0||rx2>=W)continue;
        g.fillStyle=`rgba(255,${o===0?100:60},0,${fade*(o===0?0.14:0.06)*flick})`;
        g.fillRect(rx2,GY,CS,ROWS*CS);
      }
      const dx2=boss.dbDir.idx*CS+CS/2;
      g.beginPath();g.moveTo(dx2,GY);g.lineTo(dx2,GY+ROWS*CS);g.stroke();
    }
  }

  // ── Vorrax — Fragment cells ──
  if(rd.id===0)boss.wpCells.forEach(({r,c})=>{
    const wx=c*CS,wy=GY+r*CS;
    g.fillStyle='#1a0030';g.fillRect(wx,wy,CS,CS);
    g.strokeStyle='#9922cc';g.lineWidth=1;g.strokeRect(wx+0.5,wy+0.5,CS-1,CS-1);
    g.fillStyle='#dd66ff';g.font='bold 7px Arial';g.textAlign='center';g.fillText('W',wx+CS/2,wy+CS/2+3);
  });

  // ── C'Thun — Eye Beam ──
  if(rd.id===1&&boss.eyeActive){
    const bcx=bx+bw/2,bcy=by+bh/2;
    const len=Math.max(W,H)*1.5;
    const ex=bcx+Math.cos(boss.eyeAngle)*len,ey=bcy+Math.sin(boss.eyeAngle)*len;
    g.strokeStyle='rgba(0,255,136,0.08)';g.lineWidth=CS*2;
    g.beginPath();g.moveTo(bcx,bcy);g.lineTo(ex,ey);g.stroke();
    g.strokeStyle='rgba(0,255,136,0.35)';g.lineWidth=4;
    g.beginPath();g.moveTo(bcx,bcy);g.lineTo(ex,ey);g.stroke();
    g.strokeStyle='rgba(180,255,220,0.9)';g.lineWidth=1.5;
    g.beginPath();g.moveTo(bcx,bcy);g.lineTo(ex,ey);g.stroke();
    // Pupil dot
    g.fillStyle='#00ffaa';g.beginPath();g.arc(bcx,bcy,5,0,Math.PI*2);g.fill();
  }

  // ── C'Thun — Tentacles ──
  if(rd.id===1)boss.tentacles.forEach(t=>{
    const tx=t.c*CS,ty=GY+t.r*CS;
    g.fillStyle='#001a08';g.fillRect(tx,ty,CS,CS);
    g.strokeStyle='#00aa44';g.lineWidth=1;g.strokeRect(tx+0.5,ty+0.5,CS-1,CS-1);
    g.fillStyle='#00ff66';g.font='bold 7px Arial';g.textAlign='center';g.fillText('T',tx+CS/2,ty+CS/2+3);
  });

  // ── C'Thun — Corruption warning ──
  if(rd.id===1&&boss.corruptActive>0){
    const fade=Math.min(1,boss.corruptActive/0.5);
    g.fillStyle=`rgba(80,0,160,${fade*0.18})`;g.fillRect(0,GY,W,ROWS*CS);
    if(Math.sin(t*8)>0){
      g.fillStyle=`rgba(180,80,255,${fade*0.7})`;g.font='bold 11px Arial';g.textAlign='center';
      g.fillText('CORRUPTION — CONTROLS INVERTED',W/2,GY+18);
    }
  }

  // ── Malgath — Void Shatter warning cells ──
  if(rd.id===2&&boss.shatters&&boss.shatters.length){
    boss.shatters.forEach(s=>{
      const frac=1-s.warn/1.3;
      const sx=s.c*CS,sy=GY+s.r*CS;
      const flick=Math.sin(Date.now()/80)*0.4+0.6;
      g.fillStyle=`rgba(180,0,0,${0.12+frac*0.2*flick})`;g.fillRect(sx,sy,CS,CS);
      g.strokeStyle=`rgba(255,60,0,${0.4+frac*0.5})`;g.lineWidth=1.5;g.strokeRect(sx+0.5,sy+0.5,CS-1,CS-1);
    });
  }

  // ── Malgath — Entropy Bolt warning circles ──
  if(rd.id===2)boss.meteors.forEach(m=>{
    const frac=1-m.warn/1.6;
    const mx=m.c*CS+CS/2,my=GY+m.r*CS+CS/2;
    const r2=CS*(0.4+frac*2.2);
    // Outer danger ring
    g.strokeStyle=`rgba(255,80,0,${0.25+frac*0.6})`;g.lineWidth=2;
    g.beginPath();g.arc(mx,my,r2,0,Math.PI*2);g.stroke();
    // Fill glow
    g.fillStyle=`rgba(255,50,0,${frac*0.12})`;
    g.beginPath();g.arc(mx,my,r2,0,Math.PI*2);g.fill();
    // Inner crosshair
    if(frac>0.5){
      g.strokeStyle=`rgba(255,200,0,${(frac-0.5)*1.6})`;g.lineWidth=1;
      g.beginPath();g.moveTo(mx-8,my);g.lineTo(mx+8,my);g.stroke();
      g.beginPath();g.moveTo(mx,my-8);g.lineTo(mx,my+8);g.stroke();
    }
  });

  // ── Kil'jaeden — Darkness overlay ──
  if(rd.id===2&&boss.darkActive>0){
    const fade=Math.min(1,boss.darkActive/0.6);
    g.fillStyle=`rgba(0,0,0,${0.88*fade})`;g.fillRect(0,GY,W,ROWS*CS);
    // Show countdown
    g.fillStyle=`rgba(255,50,0,${fade*0.9})`;g.font='bold 10px Courier New';g.textAlign='center';
    g.fillText('DARKNESS  '+boss.darkActive.toFixed(1)+'s',W/2,GY+16);
    // Still draw boss glow through darkness
    g.fillStyle=`rgba(${hexRGB(rd.bossGlow)},${0.3*fade})`;g.fillRect(bx,by,bw,bh);
    g.strokeStyle=rd.bossGlow;g.lineWidth=2;g.strokeRect(bx,by,bw,bh);
  }

  // ── Devour progress bar (bottom of grid) ──
  const devFrac=boss.devouredCount/Math.max(1,boss.totalTraversable);
  const barY=GY+ROWS*CS-3,barW=W;
  g.fillStyle='#0a0008';g.fillRect(0,barY,barW,3);
  const barCol=devFrac>0.8?TX.bad:devFrac>0.5?TX.warn:rd.bossCol;
  g.fillStyle=barCol;g.fillRect(0,barY,Math.round(barW*devFrac),3);
}

// ── RAID SELECT ───────────────────────────────────────────────────────────────
function drawraidselect(){
  g.fillStyle='#07070e';g.fillRect(0,0,W,H);btns=[];
  const totalStars=campaignStars.reduce((s,n)=>s+n,0);

  // ── Header ──
  g.textAlign='center';
  g.fillStyle='#cc44ff';g.font=F(18,true);g.fillText('\u2694 RAIDS',W/2,28);
  g.fillStyle=TX.dim;g.font=FS(9,false);
  g.fillText('High-difficulty encounters. Boss entities devour the substrate.',W/2,42);
  g.fillStyle=TX.warn;g.font=FS(8,false);
  g.fillText('Campaign stars: '+totalStars+' / 15',W/2,55);

  // ── Back button — TOP LEFT, never overlaps cards ──
  g.fillStyle='#0a0a18';g.fillRect(8,6,100,24);
  g.strokeStyle='#2a2458';g.lineWidth=0.8;g.strokeRect(8,6,100,24);
  g.fillStyle=TX.dim;g.font=F(9,false);g.textAlign='center';g.fillText('\u25c4 BACK',58,21);
  mkbtn(8,6,100,24,()=>{gs='title';});

  // ── Cards — compact to fit 3 in H=640 ──
  const bx=12,bw=736,bh=170,gap=4;
  const startY=62;

  RAID_DEFS.forEach((rd,i)=>{
    const unlk=raidUnlocked[i];
    const done=raidCompleted[i];
    const by=startY+i*(bh+gap);

    g.fillStyle=unlk?'#0c0a14':'#080810';g.fillRect(bx,by,bw,bh);
    g.strokeStyle=unlk?(done?TX.good:rd.bossCol):'#141420';
    g.lineWidth=unlk?1.5:0.5;g.strokeRect(bx,by,bw,bh);
    if(unlk){g.fillStyle=rd.bossCol;g.fillRect(bx,by,4,bh);}

    // Boss mini-grid top-right
    const csz=8,mgx=bx+bw-20-rd.bossW*csz,mgy=by+8;
    for(let dr=0;dr<rd.bossH;dr++)for(let dc=0;dc<rd.bossW;dc++){
      g.fillStyle=unlk?rd.bossDark:'#0a0a14';g.fillRect(mgx+dc*csz,mgy+dr*csz,csz-1,csz-1);
      g.strokeStyle=unlk?rd.bossCol:'#2a2440';g.lineWidth=0.5;g.strokeRect(mgx+dc*csz,mgy+dr*csz,csz-1,csz-1);
    }
    g.fillStyle=unlk?rd.bossGlow:'#2a2440';g.font='bold 7px Courier New';g.textAlign='center';
    g.fillText(rd.bossW+'x'+rd.bossH,mgx+rd.bossW*csz/2,mgy+rd.bossH*csz+9);

    const tx=bx+14;
    // Name + title (all fixed px to avoid fs overlap)
    g.fillStyle=unlk?rd.bossGlow:TX.faint;g.font='bold 11px Courier New';g.textAlign='left';
    g.fillText((i+1)+'. '+rd.name,tx,by+18);
    g.fillStyle=unlk?TX.dim:TX.faint;g.font='italic 8px Arial';
    g.fillText(rd.title,tx,by+30);
    g.fillStyle=unlk?TX.body:TX.faint;g.font='8px Arial';
    g.fillText(rd.lore,tx,by+42);

    // Abilities — 14px line gap, start at y+58
    rd.abilities.forEach((ab,ai)=>{
      g.fillStyle=unlk?TX.warn:TX.faint;g.font='bold 8px Arial';g.textAlign='left';
      g.fillText('\u25b6 '+ab,tx,by+58+ai*14);
      g.fillStyle=unlk?TX.dim:TX.faint;g.font='8px Arial';
      g.fillText(rd.abilityDescs[ai],tx+78,by+58+ai*14);
    });

    // Stats
    g.fillStyle=TX.faint;g.font=FS(7.5,false);g.textAlign='left';
    g.fillText('Boss '+rd.bossW+'\xd7'+rd.bossH+
      ' \xb7 Moves every '+rd.moveInterval.toFixed(1)+'s'+
      ' \xb7 Attraction '+rd.attractMin+'\u2013'+rd.attractMax+
      ' \xb7 Wipe at '+(rd.devourLimit*100|0)+'% devoured',
      tx,by+bh-26);

    if(done){g.fillStyle=TX.good;g.font='bold 8px Arial';g.textAlign='right';g.fillText('\u2713 COMPLETED',bx+bw-10,by+20);}

    if(unlk){
      // Solo / Duo toggle
      const soloOn=gameMode==='solo';
      [[soloOn,'SOLO',true],[!soloOn,'DUO (2P)',false]].forEach(([on,lbl,setSolo],bi)=>{
        const mbx=tx+bi*76,mby=by+bh-20,mbw=70,mbh=16;
        g.fillStyle=on?'#0e1e2a':'#080812';g.fillRect(mbx,mby,mbw,mbh);
        g.strokeStyle=on?rd.bossCol:'#2a2440';g.lineWidth=on?1.2:0.6;g.strokeRect(mbx,mby,mbw,mbh);
        g.fillStyle=on?rd.bossGlow:TX.dim;g.font='bold 7px Arial';g.textAlign='center';
        g.fillText(lbl,mbx+mbw/2,mby+11);
        mkbtn(mbx,mby,mbw,mbh,()=>{gameMode=setSolo?'solo':'2p';});
      });
      // Difficulty-scaled preview
      const SMAP={NORMAL:1.0,HEROIC:0.82,MYTHIC:0.65,LEGENDARY:0.50};
      const DMAP={NORMAL:1.0,HEROIC:1.25,MYTHIC:1.55,LEGENDARY:2.0};
      const WIN_MAP={NORMAL:68,HEROIC:74,MYTHIC:80,LEGENDARY:86};
      const sm2=SMAP[difficulty]||1,dm=DMAP[difficulty]||1;
      const scaledMove=(rd.moveInterval*sm2).toFixed(1)+'s';
      const scaledDmg=dm===1?'1×':(dm+'×');
      g.fillStyle=difficulty==='NORMAL'?TX.dim:difficulty==='HEROIC'?'#4a9eff':difficulty==='MYTHIC'?'#cc44ff':'#ef9f27';
      g.font='bold 7px Arial';g.textAlign='left';
      g.fillText(difficulty+': move '+scaledMove+' \xb7 dmg '+scaledDmg+' \xb7 need '+WIN_MAP[difficulty]+'% coverage',tx+160,by+bh-12);
      // Enter Raid button
      const ebx=bx+bw-172,eby=by+bh-22,ebw=160,ebh=18;
      g.fillStyle='#120820';g.fillRect(ebx,eby,ebw,ebh);
      g.strokeStyle=rd.bossCol;g.lineWidth=1.5;g.strokeRect(ebx,eby,ebw,ebh);
      g.fillStyle=rd.bossGlow;g.font='bold 8px Arial';g.textAlign='center';
      g.fillText('\u2694 ENTER RAID \u2014 '+rd.name,ebx+ebw/2,eby+12);
      mkbtn(ebx,eby,ebw,ebh,()=>{initRaid(i);});
    } else {
      g.fillStyle=TX.faint;g.font='bold 8px Arial';g.textAlign='center';
      const lockMsg=i===0?'[LOCKED \u2014 COMPLETE PREVIOUS RAID]':'[LOCKED \u2014 COMPLETE RAID '+i+' FIRST]';
      g.fillText(lockMsg,bx+bw/2,by+bh/2+4);
    }
  });
}

// ── OVERLAYS ──────────────────────────────────────────────────────────────────
function drawoverlays(){
  // Event / system message — with glow
  if(smt>0&&sm){
    const a=Math.min(1,smt/0.4);
    g.globalAlpha=a;g.textAlign='center';
    g.shadowColor=TX.warn;g.shadowBlur=10;
    g.fillStyle=TX.warn;g.font=F(11,true);
    g.fillText(sm,W/2,GY+ROWS*CS/2-16);
    g.shadowBlur=0;g.globalAlpha=1;
  }
  // Power-up message — tinted glow
  if(pupMsgT>0&&pupMsg){
    const a=Math.min(1,pupMsgT/0.4);
    g.globalAlpha=a;g.textAlign='center';
    g.shadowColor=pupMsgCol;g.shadowBlur=8;
    g.fillStyle=pupMsgCol;g.font=F(11,true);
    g.fillText(pupMsg,W/2,GY+ROWS*CS/2+6);
    g.shadowBlur=0;g.globalAlpha=1;
  }
  if(lockMsgT>0){g.globalAlpha=Math.min(1,lockMsgT/0.3);g.textAlign='center';g.fillStyle=TX.bad;g.font=F(10,true);g.fillText(lockMsg,W/2,GY+ROWS*CS/2+26);g.globalAlpha=1;}
  // Stun/capture indicator with animated icon
  [[p1,true],[p2,false]].forEach(([w,left])=>{
    if(gameMode==='solo'&&!left)return;if(!w.cap&&!w.stunned)return;
    g.globalAlpha=1;g.textAlign=left?'left':'right';const ox=left?w.px+14:w.px-14;
    if(w.stunned>0){
      g.shadowColor='#888';g.shadowBlur=6;
      g.fillStyle='#888';g.font=F(9,true);g.fillText('STUNNED '+w.stunned.toFixed(1)+'s',ox,w.py-18);
      g.shadowBlur=0;
    } else {
      const flic=Math.sin(Date.now()/80)>0;
      g.shadowColor=TX.bad;g.shadowBlur=flic?8:2;
      g.fillStyle=TX.bad;g.font=F(9,true);g.fillText('FILTER CAPTURE',ox,w.py-18);
      g.shadowBlur=0;
      g.fillStyle=TX.body;g.font=FS(9,false);g.fillText(w.ct.toFixed(1)+'s',ox,w.py-6);
    }
  });
}

function drawpause(){
  g.fillStyle='rgba(7,7,14,0.92)';g.fillRect(0,0,W,H);g.textAlign='center';
  g.fillStyle=C1;g.font=F(22,true);g.fillText('PAUSED',W/2,H/2-80);

function playSeamSound(){
  if(!music.ctx||music._muted)return;
  try{
    const ac=music.ctx,t=ac.currentTime;
    // Quick ascending arp — seam topology chime
    [[_N.E5,0],[_N.G5,0.06],[_N.B5,0.12],[_N.E6,0.18]].forEach(([f,d])=>{
      const o=ac.createOscillator(),env=ac.createGain();
      o.connect(env);env.connect(ac.destination);
      o.type='triangle';o.frequency.setValueAtTime(f,t+d);
      env.gain.setValueAtTime(0,t+d);env.gain.linearRampToValueAtTime(0.12,t+d+0.02);
      env.gain.linearRampToValueAtTime(0,t+d+0.18);
      o.start(t+d);o.stop(t+d+0.2);
    });
  }catch(e){}
}

function playCollectSound(freq){
  if(!music.ctx||music._muted)return;
  try{
    const ac=music.ctx,t=ac.currentTime;
    const o=ac.createOscillator(),env=ac.createGain();
    o.connect(env);env.connect(ac.destination);
    o.type='sine';
    o.frequency.setValueAtTime(freq||660,t);
    o.frequency.linearRampToValueAtTime((freq||660)*1.5,t+0.09);
    env.gain.setValueAtTime(0.18,t);env.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.start(t);o.stop(t+0.22);
  }catch(e){}
}

function playBombSound(){
  if(!music.ctx||music._muted)return;
  try{
    const ac=music.ctx,t=ac.currentTime;
    const buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*0.35),ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const ns=ac.createBufferSource(),ng=ac.createGain();
    ns.buffer=buf;ns.connect(ng);ng.connect(ac.destination);
    ng.gain.setValueAtTime(0.28,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    ns.start(t);ns.stop(t+0.35);
    const o=ac.createOscillator(),env=ac.createGain();
    o.connect(env);env.connect(ac.destination);
    o.type='sawtooth';o.frequency.setValueAtTime(180,t);
    o.frequency.exponentialRampToValueAtTime(40,t+0.2);
    env.gain.setValueAtTime(0.2,t);env.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.start(t);o.stop(t+0.22);
  }catch(e){}
}

const music={
  ctx:null,nodes:[],playing:false,current:null,vol:0.38,_v:0,_muted:false,
  init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended'&&!this._muted)this.ctx.resume();},
  stop(){this._v++;this.playing=false;this.current=null;this.nodes.forEach(n=>{try{n.stop(0);}catch(e){}});this.nodes=[];},
  play(id){this.init();if(this.current===id&&this.playing)return;this.stop();this.current=id;this.playing=true;if(MTRACKS[id])MTRACKS[id]();},
  pause(){if(this.ctx&&this.ctx.state==='running')this.ctx.suspend();},
  resume(){if(this._muted)return;if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},
  toggleMute(){
    this._muted=!this._muted;
    if(this._muted){if(this.ctx&&this.ctx.state==='running')this.ctx.suspend();}
    else{if(this.ctx&&this.ctx.state==='suspended'&&gs!=='paused')this.ctx.resume();}
  },
  noteNode(freq,wave,vol,t,dur){
    const ac=this.ctx,osc=ac.createOscillator(),env=ac.createGain(),mv=ac.createGain();
    osc.connect(env);env.connect(mv);mv.connect(ac.destination);
    osc.type=wave;osc.frequency.setValueAtTime(freq,t);mv.gain.setValueAtTime(this.vol*vol,t);
    const att=Math.min(0.018,dur*0.08),rel=Math.min(0.055,dur*0.15);
    const hold=Math.max(t+att,t+dur*0.88-rel);
    env.gain.setValueAtTime(0,t);env.gain.linearRampToValueAtTime(1,t+att);
    env.gain.setValueAtTime(1,hold);env.gain.linearRampToValueAtTime(0,t+dur*0.95);
    osc.start(t);osc.stop(t+dur+0.02);this.nodes.push(osc);
  }
};

function mschedV(seq,bpm,wave,vol,t0,tid,v){
  if(!music.playing||music.current!==tid||music._v!==v)return; // stale — a stop() happened
  const ac=music.ctx,bd=60/bpm;
  const total=seq.reduce((s,[,b])=>s+b,0)*bd;
  let t=t0;
  seq.forEach(([freq,beats])=>{if(freq>0)music.noteNode(freq,wave,vol,t,beats*bd*0.91);t+=beats*bd;});
  const next=t0+total,cv2=v;
  setTimeout(()=>{if(music.playing&&music.current===tid&&music._v===cv2)mschedV(seq,bpm,wave,vol,next,tid,cv2);},(next-ac.currentTime-0.14)*1000);
}

function mplay(tid,...voices){
  const ac=music.ctx,st=ac.currentTime+0.06,v=music._v;
  voices.forEach(([seq,bpm,wave,vol])=>mschedV(seq,bpm,wave,vol,st,tid,v));
}

// ── DAMAGE HIT SOUND ──────────────────────────────────────────────────────────
function playDmgSound(){
  if(!music.ctx||music._muted)return;
  try{
    const ac=music.ctx,t=ac.currentTime;
    // Descending sawtooth hit
    const osc=ac.createOscillator(),g2=ac.createGain();
    osc.connect(g2);g2.connect(ac.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(380,t);
    osc.frequency.exponentialRampToValueAtTime(95,t+0.14);
    g2.gain.setValueAtTime(0.22,t);
    g2.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    osc.start(t);osc.stop(t+0.16);
    // Short noise burst
    const buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*0.08),ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const ns=ac.createBufferSource(),ng=ac.createGain();
    ns.buffer=buf;ns.connect(ng);ng.connect(ac.destination);
    ng.gain.setValueAtTime(0.14,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    ns.start(t);ns.stop(t+0.08);
  }catch(e){}
}

function drawGem(cx,cy,r,def,lit){
  const pr=(h,f)=>parseInt(h.slice(1+f*2,3+f*2),16);
  const darken=(h,f)=>'rgb('+[0,1,2].map(i=>Math.floor(pr(h,i)*f)).join(',')+')';
  const lighten=(h,c)=>'rgba('+[0,1,2].map(i=>Math.min(255,Math.floor(pr(h,i)*1.5+c))).join(',')+',0.7)';
  // shadow
  g.fillStyle=def.dk;
  g.beginPath();gemOct(cx+1.5,cy+1.5,r);g.fill();
  // body
  g.fillStyle=lit?lighten(def.col,60):def.col;
  g.beginPath();gemOct(cx,cy,r);g.fill();
  // error flash
  if(gemError>0){
    g.fillStyle='rgba(255,60,60,'+(gemError*0.5)+')';
    g.beginPath();gemOct(cx,cy,r);g.fill();
  }
  // inner bevel
  g.fillStyle=def.hi.replace('#','rgba(').replace(/(..)(..)(..)$/,(_,r2,g2,b2)=>`${parseInt(r2,16)},${parseInt(g2,16)},${parseInt(b2,16)},0.35)`);
  g.beginPath();gemOct(cx,cy,r*0.68);g.fill();
  // highlight sparkle
  g.fillStyle='rgba(255,255,255,'+(lit?0.92:0.40)+')';
  g.beginPath();g.arc(cx-r*0.22,cy-r*0.24,r*(lit?0.22:0.14),0,Math.PI*2);g.fill();
}

function gemOct(cx,cy,r){
  const s=r*0.45;
  g.moveTo(cx-s,cy-r);g.lineTo(cx+s,cy-r);
  g.lineTo(cx+r,cy-s);g.lineTo(cx+r,cy+s);
  g.lineTo(cx+s,cy+r);g.lineTo(cx-s,cy+r);
  g.lineTo(cx-r,cy+s);g.lineTo(cx-r,cy-s);
  g.closePath();
}

}

const WASD={w:0,W:0,d:1,D:1,s:2,S:2,a:3,A:3};
const ARRS={ArrowUp:0,ArrowRight:1,ArrowDown:2,ArrowLeft:3};
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(gs==='title'){
    if(!music.playing)music.play('title'); // only start if nothing is playing yet
    if(e.key===' '||e.key==='Enter'){if(gameMode==='campaign'){gs='levelselect';music.play('levelselect');}else startFreeplay();}
    return;
  }
  if(gs==='levelselect'){
    if(e.key==='Escape'){gs='title';music.play('title');}
    return;
  }
  if(gs==='raidselect'){
    if(e.key==='Escape'){gs='title';}
    return;
  }
  if(gs==='end'){
    if(e.key===' '||e.key==='Enter'){
      if(raidMode){gs='raidselect';raidMode=false;currentRaid=null;gameMode='solo';music.play('title');}
      else if(gameMode==='campaign'){gs='levelselect';music.play('levelselect');}
      else{gs='title';music.play('title');}
      document.getElementById('hint').textContent='';
    }return;
  }
  if(e.key==='Escape'){
    if(gs==='brief'){gs='title';music.stop();music.play('title');scrollY=0;return;}
    if(gs==='playing'){gs='paused';music.pause();}
    else if(gs==='paused'){gs='playing';music.resume();}
    return;
  }
  if(gs==='countdown'){
    const dir=WASD[e.key]!==undefined?WASD[e.key]:ARRS[e.key];
    if(dir!==undefined&&countdown<=2&&countdown>1){p1.boost=2.5;if(gameMode==='2p'&&ARRS[e.key]!==undefined)p2.boost=2.5;}
    return;
  }
  if(gs!=='playing')return;
  const steer=(w,nd)=>{if(nd===undefined||w.cap||w.stunned>0)return;const op=(w.dir+2)%4;if(nd!==op)w.qd=nd;};
  if(gameMode==='2p'){steer(p1,WASD[e.key]);steer(p2,ARRS[e.key]);}
  else steer(p1,WASD[e.key]!==undefined?WASD[e.key]:ARRS[e.key]);
});
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(gs==='brief'){gs='title';music.stop();music.play('title');scrollY=0;return;}
  if(gs==='title'&&!music.playing)music.play('title');
  btns.forEach(b=>{if(mx>=b.x&&mx<b.x+b.w&&my>=b.y&&my<b.y+b.h)b.fn();});
});

// ── ANIMATED BORDER ───────────────────────────────────────────────────────────
const BORDER_PALETTES={
  title:    [[42,24,133],[91,200,245],[42,24,133]],
  levelselect:[[26,106,204],[91,200,245],[167,130,255]],
  raidselect:[[153,34,204],[221,102,255],[80,0,120]],
  brief:    [[180,120,0],[255,215,0],[180,120,0]],
  genesis:  [[91,200,245],[74,222,128],[91,200,245]],
  labyrinth:[[34,212,90],[10,140,60],[34,212,90]],
  deep:     [[154,96,255],[80,30,180],[154,96,255]],
  fracture: [[239,159,39],[180,80,0],[239,159,39]],
  crucible: [[255,96,96],[180,20,20],[255,96,96]],
  freeplay: [[91,200,245],[42,24,133],[91,200,245]],
  paused:   [[50,60,90],[70,90,130],[50,60,90]],
  end_win:  [[74,222,128],[20,160,60],[74,222,128]],
  end_lose: [[251,113,133],[180,30,50],[251,113,133]],
  raid_0:   [[153,34,204],[221,102,255],[80,0,120]],
  raid_1:   [[0,100,40],[0,255,136],[0,60,20]],
  raid_2:   [[180,20,0],[255,80,0],[100,10,0]],
};

function getBorderPalette(){
  if(gs==='brief')return BORDER_PALETTES.brief;
  if(gs==='title')return BORDER_PALETTES.title;
  if(gs==='levelselect')return BORDER_PALETTES.levelselect;
  if(gs==='raidselect')return BORDER_PALETTES.raidselect;
  if(gs==='paused')return BORDER_PALETTES.paused;
  if(gs==='end'){
    if(raidMode&&currentRaid)return currentRaid.borderPal||BORDER_PALETTES.end_lose;
    const pw=gameMode==='solo'||(p2.fcc>=3&&p1.fcc<3)||(p1.fcc<3&&p2.fcc<3&&p1.score>=p2.score);
    return pw?BORDER_PALETTES.end_win:BORDER_PALETTES.end_lose;
  }
  if(gs==='playing'||gs==='countdown'){
    if(raidMode&&currentRaid)return BORDER_PALETTES['raid_'+currentRaid.id]||BORDER_PALETTES.freeplay;
    if(!currentLevel)return BORDER_PALETTES.freeplay;
    const palKeys=['genesis','labyrinth','deep','fracture','crucible'];
    return BORDER_PALETTES[palKeys[campaignLevel]]||BORDER_PALETTES.freeplay;
  }
  return BORDER_PALETTES.title;
}

// ── STARFIELD BACKGROUND ──────────────────────────────────────────────────────
const bgc=document.getElementById('bgc');
const bgx=bgc.getContext('2d');
let bgW=0,bgH=0;

function resizeBg(){
  bgW=bgc.width=window.innerWidth;
  bgH=bgc.height=window.innerHeight;
}
resizeBg();
function scaleCanvas(){
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  const isPortrait=window.innerHeight>window.innerWidth;
  if(isTouch&&isPortrait){
    // Fill full width — D-pad takes the rest of the screen
    const scale=window.innerWidth/W;
    cv.style.width=Math.round(W*scale)+'px';
    cv.style.height=Math.round(H*scale)+'px';
  } else {
    const scaleX=(window.innerWidth*0.96)/W;
    const scaleY=(window.innerHeight*0.94)/H;
    const scale=Math.min(scaleX,scaleY,2.0);
    cv.style.width=Math.round(W*scale)+'px';
    cv.style.height=Math.round(H*scale)+'px';
  }
}
scaleCanvas();
window.addEventListener('resize',()=>{resizeBg();scaleCanvas();});

function mkPart(){
  return {
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    sz:Math.random()<0.65?2:Math.random()<0.85?3:5,
    spd:0.08+Math.random()*0.35,
    drift:(Math.random()-0.5)*0.12,
    op:0.04+Math.random()*0.18,
    phase:Math.random()*Math.PI*2,
  };
}
function mkShot(){
  const ang=-0.35+Math.random()*0.35; // mostly rightward, slight downward
  const spd=6+Math.random()*10;
  return {
    x:Math.random()*window.innerWidth*0.6,
    y:Math.random()*window.innerHeight*0.7,
    vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    len:40+Math.random()*80,
    life:1,decay:0.018+Math.random()*0.025,
  };
}

const PARTS=Array.from({length:90},mkPart);
const SHOTS=[];
let lastShot=0;

function drawBg(now,r,gr,b){
  if(!bgx||bgW===0)return;
  // Fade trail
  bgx.fillStyle='rgba(7,7,14,0.35)';
  bgx.fillRect(0,0,bgW,bgH);

  const t=now/1000;

  // Drifting space blocks
  PARTS.forEach(p=>{
    p.y-=p.spd;
    p.x+=p.drift;
    if(p.y<-8){p.y=bgH+4;p.x=Math.random()*bgW;}
    if(p.x<-8||p.x>bgW+8)p.x=((p.x%bgW)+bgW)%bgW;
    const pulse=0.7+0.3*Math.sin(t*1.2+p.phase);
    bgx.globalAlpha=p.op*pulse;
    bgx.fillStyle=`rgb(${r},${gr},${b})`;
    bgx.fillRect(Math.round(p.x),Math.round(p.y),p.sz,p.sz);
  });

  // Shooting streaks
  if(now-lastShot>1800+Math.random()*5000){lastShot=now;SHOTS.push(mkShot());}
  for(let i=SHOTS.length-1;i>=0;i--){
    const s=SHOTS[i];
    s.life-=s.decay;
    if(s.life<=0){SHOTS.splice(i,1);continue;}
    s.x+=s.vx;s.y+=s.vy;
    const mag=Math.hypot(s.vx,s.vy);
    const tx=s.x-s.vx/mag*s.len,ty=s.y-s.vy/mag*s.len;
    // Head glow
    bgx.globalAlpha=s.life*0.85;
    bgx.strokeStyle=`rgba(${r},${gr},${b},${s.life})`;
    bgx.lineWidth=1.5;
    bgx.beginPath();bgx.moveTo(s.x,s.y);bgx.lineTo(tx,ty);bgx.stroke();
    // Soft outer glow
    bgx.globalAlpha=s.life*0.22;
    bgx.strokeStyle=`rgba(${r},${gr},${b},${s.life*0.5})`;
    bgx.lineWidth=4;
    bgx.beginPath();bgx.moveTo(s.x,s.y);bgx.lineTo(tx,ty);bgx.stroke();
    // Tiny sparkle at head
    bgx.globalAlpha=s.life;
    bgx.fillStyle=`rgba(255,255,255,${s.life*0.8})`;
    bgx.fillRect(Math.round(s.x)-1,Math.round(s.y)-1,2,2);
  }
  bgx.globalAlpha=1;
}

function updateBorderAnim(now){
  const t=now/1000;
  const pal=getBorderPalette();
  const p=(Math.sin(t*1.4)+1)/2;
  const p2=(Math.sin(t*2.8+1)+1)/2;
  const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
  const seg=p<0.5?[pal[0],pal[1],p*2]:[pal[1],pal[2],(p-0.5)*2];
  const r=lerp(seg[0][0],seg[1][0],seg[2]);
  const gr=lerp(seg[0][1],seg[1][1],seg[2]);
  const b=lerp(seg[0][2],seg[1][2],seg[2]);
  const glow=Math.round(4+p2*10);
  const alpha=(0.3+p2*0.35).toFixed(2);
  cv.style.borderColor=`rgb(${r},${gr},${b})`;
  cv.style.boxShadow=`0 0 ${glow}px rgba(${r},${gr},${b},${alpha})`;
  drawBg(now,r,gr,b);
}

function loop(now){update(now);updateBorderAnim(now);render();updateMobileUI();requestAnimationFrame(loop);}
requestAnimationFrame(loop);

// ── MOBILE CONTROLS ───────────────────────────────────────────────────────────
// IS_TOUCH and IS_PORTRAIT() are defined at top of script

// Steer P1 (only player on mobile)
function steerP1(nd){
  if(nd===undefined||p1.cap||p1.stunned>0)return;
  const op=(p1.dir+2)%4;if(nd!==op)p1.qd=nd;
}
function steerP2(nd){
  if(nd===undefined||p2.cap||p2.stunned>0)return;
  const op=(p2.dir+2)%4;if(nd!==op)p2.qd=nd;
}

// ── D-PAD touch handling ──────────────────────────────────────────────────────
const pressedBtns=new Set();

function dpadDown(e){
  e.preventDefault();
  const touches=e.changedTouches||[e];
  for(let i=0;i<touches.length;i++){
    const t=touches[i];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(!el||el.dataset.dir===undefined)continue;
    const dir=parseInt(el.dataset.dir);
    el.classList.add('pressed');pressedBtns.add(el);
    if(gs==='playing'||gs==='countdown')steerP1(dir);
  }
}

function dpadMove(e){
  e.preventDefault();
  const touches=e.changedTouches||[e];
  for(let i=0;i<touches.length;i++){
    const t=touches[i];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(!el||el.dataset.dir===undefined)continue;
    const dir=parseInt(el.dataset.dir);
    if(!pressedBtns.has(el)){el.classList.add('pressed');pressedBtns.add(el);}
    if(gs==='playing')steerP1(dir);
  }
}

function dpadUp(e){
  e.preventDefault();
  pressedBtns.forEach(el=>el.classList.remove('pressed'));
  pressedBtns.clear();
}

const dpadEl=document.getElementById('dpad-p1');
if(dpadEl){
  dpadEl.addEventListener('touchstart',dpadDown,{passive:false});
  dpadEl.addEventListener('touchmove',dpadMove,{passive:false});
  dpadEl.addEventListener('touchend',dpadUp,{passive:false});
  dpadEl.addEventListener('touchcancel',dpadUp,{passive:false});
}

// ── SWIPE on canvas ───────────────────────────────────────────────────────────
let swipeStartX=0,swipeStartY=0,swipeActive=false;
const SWIPE_THRESH=22;
let swipeHintShown=false;
const swipeHintEl=document.getElementById('swipe-hint');

function showSwipeHint(){
  if(swipeHintShown||!swipeHintEl)return;
  swipeHintShown=true;
  swipeHintEl.style.display='flex';
  requestAnimationFrame(()=>{swipeHintEl.style.opacity='1';});
  setTimeout(()=>{
    swipeHintEl.style.opacity='0';
    setTimeout(()=>{swipeHintEl.style.display='none';},400);
  },1600);
}

cv.addEventListener('touchstart',e=>{
  if(e.touches.length!==1)return;
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
  swipeActive=true;
  if(gs==='playing'&&!swipeHintShown)showSwipeHint();
  if(gs==='countdown'&&countdown<=2&&countdown>1)p1.boost=4;
},{passive:true});

cv.addEventListener('touchend',e=>{
  if(!swipeActive)return;swipeActive=false;
  const dx=e.changedTouches[0].clientX-swipeStartX;
  const dy=e.changedTouches[0].clientY-swipeStartY;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx<SWIPE_THRESH&&ady<SWIPE_THRESH){
    // Short tap → route to menu button system
    const r=cv.getBoundingClientRect();
    const mx=(e.changedTouches[0].clientX-r.left)*(W/r.width);
    const my=(e.changedTouches[0].clientY-r.top)*(H/r.height);
    if(gs==='brief'){gs='title';music.stop();music.play('title');scrollY=0;return;}
    btns.forEach(b=>{if(mx>=b.x&&mx<b.x+b.w&&my>=b.y&&my<b.y+b.h)b.fn();});
    return;
  }
  if(gs!=='playing')return;
  let dir;
  if(Math.abs(dx)>Math.abs(dy)){dir=dx>0?1:3;}
  else{dir=dy>0?2:0;}
  steerP1(dir);
},{passive:true});

cv.addEventListener('touchmove',e=>{
  if(gs==='playing'||gs==='countdown')e.preventDefault();
},{passive:false});

// ── MINI HUD (portrait mobile) ────────────────────────────────────────────────
const mhudP1=document.getElementById('mhud-p1');
const mhudP2=document.getElementById('mhud-p2');
const mhudTimer=document.getElementById('mhud-timer');
const mobileHud=document.getElementById('mobile-hud');
const dpadWrap=document.getElementById('dpad-wrap');

function updateMobileUI(){
  if(!IS_TOUCH||!IS_PORTRAIT())return;
  const playing=gs==='playing'||gs==='countdown'||gs==='paused';

  // Show/hide dpad and mini-hud only during active game
  if(dpadWrap)dpadWrap.style.display=(playing||gs==='end')?'flex':'none';
  if(mobileHud)mobileHud.style.display=playing?'flex':'none';

  // Update mini-HUD values
  if(playing&&mhudP1&&mhudP2&&mhudTimer){
    mhudP1.textContent=p1.score.toLocaleString();
    if(gameMode!=='solo'){
      mhudP2.textContent=p2.score.toLocaleString();
      document.querySelector('#mobile-hud div:last-child .mhud-label').textContent=
        gameMode==='vsai'?'AI':'P2';
    } else {
      mhudP2.textContent='';
    }
    if(raidMode){
      const m=Math.floor(raidElapsed/60),s=Math.floor(raidElapsed%60).toString().padStart(2,'0');
      mhudTimer.textContent=m+':'+s;
    } else {
      const m=Math.floor(gt/60),s=Math.floor(gt%60).toString().padStart(2,'0');
      mhudTimer.textContent=m+':'+s;
    }
  }
}
