<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>DGTH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* ── DESKTOP / LANDSCAPE: centered, original feel ── */
body{
  background:#07070e;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:system-ui,-apple-system,sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}
#bgc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#canvas-wrap{position:relative;z-index:1;display:inline-block;flex-shrink:0;}
canvas#dgth{
  display:block;
  border:4px solid #2a2050;
  border-radius:18px;
  clip-path:inset(0 round 18px);
  cursor:pointer;
  transition:border-color 0.4s,box-shadow 0.4s;
  touch-action:none;
}
#hint{
  color:#6a7a9a;font-size:12px;margin-top:8px;
  letter-spacing:1px;min-height:16px;
  text-align:center;position:relative;z-index:1;
}
#dpad-wrap{display:none;}
#mobile-hud{display:none;}

/* ── PORTRAIT TOUCH: full-screen column layout ── */
@media (pointer:coarse) and (orientation:portrait){
  body{
    justify-content:flex-start;
    height:100dvh;
    overflow:hidden;
  }

  /* Canvas flush to top, full width, no rounding on sides */
  #canvas-wrap{
    width:100%;
    flex-shrink:0;
  }
  canvas#dgth{
    width:100% !important;
    height:auto !important;
    border-radius:0;
    clip-path:none;
    border-left:none;border-right:none;border-top:none;
    border-bottom:1px solid #1a1a38;
  }

  /* Hide keyboard hint on mobile */
  #hint{display:none;}

  /* Mini HUD strip — score + timer at a glance */
  #mobile-hud{
    display:flex;
    flex-shrink:0;
    width:100%;
    background:#06060f;
    border-bottom:1px solid #14143a;
    padding:6px 16px;
    align-items:center;
    justify-content:space-between;
    z-index:2;
    position:relative;
  }
  .mhud-score{
    font-family:system-ui,-apple-system,sans-serif;
    font-size:15px;
    font-weight:bold;
    letter-spacing:1px;
  }
  .mhud-timer{
    font-family:system-ui,-apple-system,sans-serif;
    font-size:13px;
    color:#4a6a8a;
    letter-spacing:2px;
  }
  .mhud-label{
    font-size:9px;
    letter-spacing:2px;
    color:#3a4a68;
    display:block;
    margin-bottom:1px;
  }

  /* Thumbstick zone — fills all remaining space below canvas */
  #dpad-wrap{
    display:flex !important;
    flex:1;
    min-height:0;
    width:100%;
    background:#04040b;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:2;
    user-select:none;-webkit-user-select:none;
  }

  /* Outer ring — sized to fill the control zone */
  #stick-outer{
    width:min(54vw, 44dvh, 240px);
    height:min(54vw, 44dvh, 240px);
    border-radius:50%;
    border:1.5px solid rgba(91,200,245,0.14);
    background:rgba(8,8,22,0.7);
    position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  /* Cardinal tick marks */
  #stick-outer::before{
    content:'';
    position:absolute;inset:0;
    border-radius:50%;
    background:
      radial-gradient(ellipse 2px 18% at 50% 4%, rgba(91,200,245,0.25) 0%, transparent 100%),
      radial-gradient(ellipse 2px 18% at 50% 96%, rgba(91,200,245,0.25) 0%, transparent 100%),
      radial-gradient(ellipse 18% 2px at 4% 50%, rgba(91,200,245,0.25) 0%, transparent 100%),
      radial-gradient(ellipse 18% 2px at 96% 50%, rgba(91,200,245,0.25) 0%, transparent 100%);
  }
  /* Inner nub */
  #stick-nub{
    width:38%;height:38%;
    border-radius:50%;
    background:radial-gradient(circle at 38% 38%, #1e2050, #0c0c28);
    border:2px solid rgba(91,200,245,0.45);
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    transition:border-color 0.1s;
    pointer-events:none;
  }
  #stick-nub.active{
    border-color:rgba(91,200,245,0.9);
    box-shadow:0 0 18px rgba(91,200,245,0.4);
  }

  /* Direction indicator arc — lights up the active quadrant */
  #stick-dir-arc{
    position:absolute;inset:0;border-radius:50%;pointer-events:none;opacity:0;
    transition:opacity 0.1s;
  }
  #stick-dir-arc.show{opacity:1;}

  /* Swipe hint */
  #swipe-hint{transition:opacity 0.3s;}

  /* On mobile, hide the 2P mode button */
  .mode-2p-btn{display:none !important;}
}

/* Very small phones */
@media (pointer:coarse) and (orientation:portrait) and (max-width:360px){
  #stick-outer{width:min(62vw,38dvh,180px);height:min(62vw,38dvh,180px);}
}

function loadSave(){

      save={...DEFAULT_SAVE,...d};
      save.campaignStars=Array.isArray(d.campaignStars)?d.campaignStars.slice():[0,0,0,0,0,0,0,0];
      save.raidCompleted=Array.isArray(d.raidCompleted)?d.raidCompleted.slice():[false,false,false,false,false,false];

  }catch(e){}

  // Pad to 8 if old save had fewer
  while(campaignStars.length<8)campaignStars.push(0);
  campaignUnlocked=Math.max(1,campaignStars.filter(s=>s>0).length+1);
  if(campaignUnlocked>8)campaignUnlocked=8;

}

let particles=[];
function spawnPart(x,y,col,vx,vy,life,sz){
  particles.push({x,y,col,vx,vy,life,maxLife:life,sz:sz||2});
}
function spawnBurst(x,y,col,count,speed,life){
  if(particles.length>280)return; // cap total particles
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=speed*(0.5+Math.random()*0.5);
    spawnPart(x,y,col,Math.cos(a)*s,Math.sin(a)*s,life*(0.7+Math.random()*0.6),1+Math.random()*2.5);
  }
}
function spawnRing(x,y,col,count,speed,life){
  if(particles.length>280)return;
  for(let i=0;i<count;i++){
    const a=(i/count)*Math.PI*2;
    spawnPart(x,y,col,Math.cos(a)*speed,Math.sin(a)*speed,life,2);
  }
}
function spawnConfetti(x,y,cols,count){
  for(let i=0;i<count;i++){
    const col=cols[Math.floor(Math.random()*cols.length)];
    const a=Math.random()*Math.PI*2;
    const s=2+Math.random()*4;
    spawnPart(x,y,col,Math.cos(a)*s,(Math.sin(a)*s)-3,1.5+Math.random()*1.5,2+Math.random()*3);
  }
}
function updateParticles(dt){
  // Hard cap — cull oldest particles if over limit
  if(particles.length>300)particles.splice(0,particles.length-300);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.09;p.vx*=0.97;
    p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    const t=p.life/p.maxLife;
    g.globalAlpha=Math.min(1,t*2.5)*0.9;
    g.fillStyle=p.col;
    g.fillRect(Math.round(p.x-p.sz/2),Math.round(p.y-p.sz/2),Math.ceil(p.sz),Math.ceil(p.sz));
  });
  g.globalAlpha=1;
}

function genPoly(sr,sc,size){
  const cells=[{r:sr,c:sc}],tried=new Set([sr+','+sc]);
  while(cells.length<size){
    const src=cells[Math.floor(Math.random()*cells.length)];
    const dirs=[[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-0.5);
    let added=false;
    for(const[dr,dc]of dirs){
      const nr=src.r+dr,nc=src.c+dc,k=nr+','+nc;
      if(nr>1&&nr<ROWS-2&&nc>1&&nc<COLS-2&&!tried.has(k)){tried.add(k);cells.push({r:nr,c:nc});added=true;break;}
    }
    if(!added)break;
  }
  return cells;
}

function gensub(){
  const lv=currentLevel;
  sub=[];
  for(let r=0;r<ROWS;r++){sub[r]=[];for(let c=0;c<COLS;c++){
    let bd=lv.allDense?4+Math.floor(Math.random()*2):1+Math.floor(Math.random()*5);
    sub[r][c]={d:bd,bd,sf:0,fl:0,v:false,seam:false,owner:0,lock:0,uf:0,zone:0,tempLock:false,voided:0};
  }}
  const zones=Array.from({length:10},()=>({x:2+Math.random()*(COLS-4),y:2+Math.random()*(ROWS-4)}));
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    let md=Infinity,nz=0;
    zones.forEach((z,i)=>{const d=Math.hypot(c-z.x,r-z.y);if(d<md){md=d;nz=i;}});
    sub[r][c].zone=nz;
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const z=sub[r][c].zone;
    sub[r][c].seam=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].some(
      ([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&sub[nr][nc].zone!==z);
  }
  const p1sx=Math.floor(COLS*0.25),p1sy=Math.floor(ROWS/2);
  const p2sx=Math.floor(COLS*0.75),p2sy=Math.floor(ROWS/2);
  const safe=(r,c)=>(Math.abs(r-p1sy)>3||Math.abs(c-p1sx)>3)&&(Math.abs(r-p2sy)>3||Math.abs(c-p2sx)>3);
  const blockCount=lv.moreBlocks?[12,9,6]:[8,6,4];
  const blockSize=lv.moreBlocks?[6,7,8]:[4,5,6];
  const placed=new Set();
  [1,2,3].forEach(tier=>{
    const cnt=blockCount[tier-1],sz=blockSize[tier-1];
    for(let n=0;n<cnt;n++){
      let att=0;
      while(att++<80){
        const sr=3+Math.floor(Math.random()*(ROWS-6)),sc=3+Math.floor(Math.random()*(COLS-6));
        if(!safe(sr,sc))continue;
        const cells=genPoly(sr,sc,sz+Math.floor(Math.random()*3));
        if(cells.some(({r,c})=>placed.has(r+','+c)))continue;
        cells.forEach(({r,c})=>{placed.add(r+','+c);sub[r][c].lock=tier;});
        break;
      }
    }
  });
  // Isolation boxes for crucible
  tempLocks=new Set();
  isolateInterior=new Set();
  if(lv.event&&lv.event.type==='isolate'){
    [[p1sx,p1sy],[p2sx,p2sy]].forEach(([cx,cy])=>{
      // Walls (tempLock)
      for(let dr=-4;dr<=4;dr++)for(let dc=-4;dc<=4;dc++){
        if(Math.abs(dr)===4||Math.abs(dc)===4){
          const r=cy+dr,c=cx+dc;
          if(r>=0&&r<ROWS&&c>=0&&c<COLS){
            sub[r][c].tempLock=true;
            sub[r][c].lock=0;
            tempLocks.add(r+','+c);
          }
        }
      }
      // Interior cells — track for early-release condition
      for(let dr=-3;dr<=3;dr++)for(let dc=-3;dc<=3;dc++){
        const r=cy+dr,c=cx+dc;
        if(r>=0&&r<ROWS&&c>=0&&c<COLS)isolateInterior.add(r+','+c);
      }
    });
  }
}

function leadScore(){return Math.max(p1.score,gameMode==='solo'?0:p2.score);}
function unlocked(lk){return lk===0||leadScore()>=UNLOCKS[lk];}
function canEnter(nx,ny,skipTemp=false){
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS)return false;
  const cell=sub[ny][nx];
  if(cell.tempLock&&!skipTemp&&!isolateOpen)return false;
  if(cell.voided)return false;
  if(raidMode){
    if(cell.devoured)return false;
    if(boss.cells.has(ny+','+nx))return false;
    if(currentRaid&&currentRaid.id===0&&boss.wpCells.some(w=>w.r===ny&&w.c===nx))return false;
    if(currentRaid&&currentRaid.id===1&&boss.tentacles.some(t=>t.r===ny&&t.c===nx))return false;
  }
  return unlocked(cell.lock);
}

function getDiffCfg(){return DIFF_CFG[difficulty];}
function getAIDepth(){
  const lv=currentLevel||LEVELS[0];
  return lv.aiBase+getDiffCfg().bfsBonus;
}

function lookahead(startC,startR,steps){
  const seen=new Set([startR+','+startC]);
  let frontier=[{r:startR,c:startC}];
  let unvis=sub[startR][startC].v?0:1;
  for(let s=0;s<steps&&frontier.length;s++){
    const next=[];
    for(const{r,c}of frontier){
      for(let d=0;d<4;d++){
        const nr=r+DY[d],nc=c+DX[d],k=nr+','+nc;
        if(seen.has(k))continue;
        if(!canEnter(nc,nr))continue;
        seen.add(k);
        if(!sub[nr][nc].v)unvis++;
        next.push({r:nr,c:nc});
      }
    }
    frontier=next;
  }
  return unvis;
}

function aistep(w){
  const opp=(w.dir+2)%4;
  const cfg=getDiffCfg();
  const depth=getAIDepth();
  const escaping=w.stag>cfg.escapeStag;
  const isMythicPlus=['MYTHIC','LEGENDARY','INSANE','NIGHTMARE','FIENDISH'].includes(difficulty);
  let best=-Infinity,bdir=w.dir;
  for(let di=0;di<4;di++){
    if(di===opp)continue;
    const nx=w.gx+DX[di],ny=w.gy+DY[di];
    if(!canEnter(nx,ny))continue;
    const cell=sub[ny][nx];
    let sc=0;
    if(escaping){
      sc=lookahead(nx,ny,depth+2)*20;
      if(!cell.v)sc+=cell.d*8;
    } else {
      sc=cell.v?cell.sf*5:cell.d*10+50;
      if(cell.seam&&!cell.v)sc+=30;
      if(di===w.dir)sc+=6;
      sc+=lookahead(nx,ny,isMythicPlus?depth+4:depth)*(isMythicPlus?8:4);
    }
    sc+=Math.random()*cfg.noise;
    if(sc>best){best=sc;bdir=di;}
  }
  // Chase powerups
  for(let di=0;di<4;di++){
    const nx=w.gx+DX[di],ny=w.gy+DY[di];
    if(powerups.some(p=>p.c===nx&&p.r===ny)&&canEnter(nx,ny))bdir=di;
  }
  w.qd=bdir;
}

function advance(w,isAI){
  const opp=(w.dir+2)%4;
  if(isAI)aistep(w);
  if(w.scramble>0&&Math.random()<0.35){    const opts=[0,1,2,3].filter(d=>d!==opp);
    w.qd=opts[Math.floor(Math.random()*opts.length)];
  }
  // Xorrath corruption — invert queued direction (player only)
  let effQd=w.qd;
  if(raidMode&&currentRaid&&currentRaid.id===1&&boss.corruptActive>0&&!isAI)effQd=[2,3,0,1][w.qd];
  // THE VEIL invert event — flip all four directions
  if(!isAI&&currentLevel&&currentLevel.event&&currentLevel.event.type==='invert'&&currentLevel.event._fired&&!eventFired)effQd=[2,3,0,1][effQd];
  const qx=w.gx+DX[effQd],qy=w.gy+DY[effQd];
  if(effQd!==opp&&canEnter(qx,qy))w.dir=effQd;
  let nx=w.gx+DX[w.dir],ny=w.gy+DY[w.dir];
  if(!canEnter(nx,ny)){
    if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS&&sub[ny][nx].tempLock&&!isolateOpen){
      if(!isAI)w.stunned=Math.max(w.stunned,0.4);
      sub[ny][nx].uf=1.2;
      if(!isAI&&smt<=0){sm='\u25a0 CAGE PULSE \u2014 BREAK FREE AT 60s';smt=1.4;}
    }
    if(!isAI&&nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&sub[ny][nx].lock>0&&!unlocked(sub[ny][nx].lock)){
      lockMsg='INSUFFICIENT TRAVERSAL DEPTH';lockMsgT=1.2;
    }
    let ok=false;
    for(let d=0;d<4;d++){
      if(d===opp)continue;
      const tx=w.gx+DX[d],ty=w.gy+DY[d];
      if(canEnter(tx,ty)){w.dir=d;w.qd=d;nx=tx;ny=ty;ok=true;break;}
    }
    if(!ok)return;
  }
  // Resonance echo — push current position, age old entries
  w.echo.unshift({x:w.gx,y:w.gy,age:0});
  if(w.echo.length>6)w.echo.pop();
  const pz=sub[w.gy][w.gx].zone;
  w.gx=nx;w.gy=ny;w.fd=w.dir;
  const nc=sub[ny][nx],key=nx+','+ny,isnew=!nc.v;
  const surgeActive=currentLevel&&currentLevel.event&&currentLevel.event.type==='surge'&&currentLevel.event._fired&&!eventFired;
  const core=(!isAI?(burrowUpgrades.core||1):1);
  const _advGs=!isAI?getGearStats():{};
  const denseMult=(core>=3?(1.15):core>=6?(1.35):core>=9?3.0:1)*(1+(_advGs.score_mult||0)/100);
  const seamBonusAmt=50+(core>=2?25:0)+(core>=5?50:0)+(_advGs.seam_bonus||0);
  const critScore=!isAI&&(_advGs.crit_score||0)>0&&Math.random()<(_advGs.crit_score/100);
  const pts=Math.round((nc.d*10+(w.dir===w.fd?nc.d*5:0))*denseMult*(surgeActive?2:1)*(critScore?2:1));  if(isnew){
    w.vis.add(key);w.stag=0;nc.v=true;nc.owner=isAI?2:1;w.score+=pts;
    // LEGS T3: Momentum — increment on new cell, same direction
    if(!isAI&&(burrowUpgrades.legs||1)>=3){
      if(w.dir===w.fd)w.momentum=Math.min(3,(w.momentum||0)+1);
      else w.momentum=0;
    }
    const pcx=nx*CS+CS/2,pcy=GY+ny*CS+CS/2;
    const pcol=isAI?C2:C1;
    spawnBurst(pcx,pcy,pcol,4+Math.floor(nc.bd/2),1.2+nc.bd*0.25,0.4+nc.bd*0.06);
    if(!isAI){spawnScorePop(pcx,pcy-5,'+'+pts,pts>30?TX.warn:C1);addCoins(1+(nc.bd>=4?1:0));}
  } else w.vis.add(key);
  nc.sf=Math.min(1,nc.sf+(isnew?0.5:0.12));
  nc.d=Math.max(1,nc.bd-Math.floor(nc.sf*2.5));nc.fl=1;
  if(pz!==sub[ny][nx].zone){
    const seamBonus=seamBonusAmt; // uses core tier value
    w.sc++;w.score+=seamBonus;
    const scx=nx*CS+CS/2,scy=GY+ny*CS+CS/2;
    // Rainbow burst — reduced count to prevent particle overload on rapid crossings
    const rainbowBurstCols=['#ff4466','#ffee00','#44aaff','#cc44ff'];
    rainbowBurstCols.forEach(rc=>spawnBurst(scx,scy,rc,2,2.4+Math.random()*0.8,0.6));
    spawnRing(scx,scy,TX.warn,8,2.8,0.75);
    spawnScorePop(scx,scy-10,'+'+seamBonus+' SEAM',TX.warn);
    if(!isAI){sm='SEAM EVENT \xb7 INTERSECTION TOPOLOGY \xb7 +'+seamBonus;smt=2;playSeamSound();addCoins(5);}
  }
  // CORE T4: Archivist — bonus score when traversing a devoured cell (raid only)
  if(!isAI&&core>=4&&raidMode&&nc.devoured){
    const archBonus=20;
    w.score+=archBonus;
    spawnScorePop(nx*CS+CS/2,GY+ny*CS-8,'+'+archBonus+' ARCHIVE',TX.warn);
  }
  const pi=powerups.findIndex(p=>p.r===ny&&p.c===nx);
  if(pi>=0){applyPup(w,isAI,powerups[pi].type);if(!isAI)addCoins(3);powerups.splice(pi,1);}
  // Board item collection — only player 1 picks up
  if(!isAI){
    const bi=boardItems.findIndex(b=>b.r===ny&&b.c===nx&&!b.collected);
    if(bi>=0){
      const drop=boardItems[bi];
      drop.collected=true;
      boardItems.splice(bi,1);
      addToInventory(drop.item);
      lastDrops=[drop.item]; // show on end screen
      persist();
      const tc=ITEM_TIERS[drop.item.tier];
      const col=drop.item.fiendish?(drop.item.col||'#ff2244'):(tc?.col||'#ffd700');
      const bx=nx*CS+CS/2,by=GY+ny*CS+CS/2;
      // Big burst in tier color
      spawnBurst(bx,by,col,12,3.5,0.8);
      spawnRing(bx,by,col,20,4,1.2);
      // Floating item name
      const variant=ITEM_VARIANTS[drop.item.slot]?.find(v=>v.key===drop.item.subtype);
      const label=drop.item.name||(variant?.label+' '+tc?.label)||'ITEM';
      spawnScorePop(bx,by-14,drop.item.fiendish?'★ '+label:label,col);
      addShake(drop.item.fiendish?8:4);
      sm=(drop.item.fiendish?'★ FIENDISH':'⬡ ITEM')+' — '+label+' — CHECK GEAR TAB';
      smt=3.5;
    }
  }
}

function applyPup(w,isAI,type){
  const other=isAI?p1:p2;
  switch(type){
    case'BOOST':w.boost=4;break;
    case'BOMB':if(gameMode!=='solo'){other.stunned=2.5;other.curled=false;}break;
    case'SHIELD':w.shield=true;break;
    case'FREEZE':if(gameMode!=='solo')other.freeze=3;break;
    case'SCRAMBLE':if(gameMode!=='solo')other.scramble=3;break;
    case'HEALTH':if(raidMode){
      const other=isAI?p1:p2;
      // Battle-rez: if ally is fallen, revive them at 30 HP
      if(gameMode!=='solo'&&other.hp<=0){
        other.hp=30;
        pupMsg=(isAI?'C1':'C2')+' \xb7 BATTLE REZ \xb7 C'+(isAI?'1':'2')+' revived at 30 HP!';
        pupMsgCol=PUPS.HEALTH.col;pupMsgT=2.5;
      } else {
        w.hp=Math.min(MAX_HP,(w.hp||0)+35);
        if(w.hp>=MAX_HP){sm='FULL HP';smt=1.5;}
      }
    }break;
  }
  const who=isAI?'C2':'C1';
  pupMsg=who+' \xb7 '+PUPS[type].label+' \xb7 '+PUPS[type].desc;
  pupMsgCol=PUPS[type].col;pupMsgT=2.2;
  // Juice: particle burst at worm position
  const ppx=w.gx*CS+CS/2,ppy=GY+w.gy*CS+CS/2;
  spawnRing(ppx,ppy,PUPS[type].col,18,3.2,0.75);
  spawnBurst(ppx,ppy,PUPS[type].col,10,2.2,0.6);
  spawnBurst(ppx,ppy,'#ffffff',4,1.5,0.35);
  if(type==='BOMB'){addShake(9);addDmgVignette(255,100,0,0.5);playBombSound();}
  else{addShake(3);playCollectSound(type==='HEALTH'?880:type==='BOOST'?660:type==='FREEZE'?440:type==='SHIELD'?550:440);}
}

function effSpd(w,d,sf,isAI){
  let s=4.5; // constant base — density is score multiplier only, not a speed gate
  if(w.boost>0)s*=1.9;if(w.freeze>0)s*=0.35;if(w.stunned>0)s=0;
  if(isAI)s*=getDiffCfg().aiSpd;
  else{
    s*=(getDiffCfg().playerSpd||1.0);
    // LEGS upgrade
    const legs=burrowUpgrades.legs||1;
    if(legs>=2)s*=1.12;
    if(legs>=3&&w.momentum)s*=(1+w.momentum*0.06);
    if(legs>=4&&w.sprintBurst>0)s*=1.35;
    if(legs>=5)s*=1.09;                              // T5: Rapid +9% more
    if(legs>=6&&w.sprintBurst>0)s*=1.10;             // T6: Afterburn boost amp
    if(legs>=7)s*=(1+Math.min(w.momentum||0,6)*0.06);// T7: Blur Step — momentum cap x2
    if(legs>=9)s*=1.50;
    // GEAR: speed bonus from equipped items
    const _gs=getGearStats();
    if(_gs.speed_pct)s*=(1+_gs.speed_pct/100);
  }
  return s;
}

function updw(w,isAI,dt){
  if(w.boost>0)w.boost=Math.max(0,w.boost-dt);
  if(w.freeze>0)w.freeze=Math.max(0,w.freeze-dt);
  if(w.scramble>0)w.scramble=Math.max(0,w.scramble-dt);
  // Age echo entries
  w.echo.forEach(e=>e.age+=dt);

  // LEGS T3: Momentum — track consecutive same-direction steps (capped at 3)
  if(!isAI){if(w.momentum===undefined)w.momentum=0;if(w.sprintBurst===undefined)w.sprintBurst=0;}

  // LEGS T4: Sprint Burst timer
  if(!isAI&&(burrowUpgrades.legs||1)>=4){
    if(w.sprintBurst>0)w.sprintBurst=Math.max(0,w.sprintBurst-dt);
    if(!w._sprintCd)w._sprintCd=0;
    w._sprintCd=Math.max(0,w._sprintCd-dt);
    const legs=burrowUpgrades.legs||1;
    const sprintCooldown=legs>=6?12:18;           // T6: faster cooldown
    if(legs>=9){w.sprintBurst=2.5;w._sprintCd=0;} // T9: permanent sprint
    else if(w._sprintCd<=0&&w.sprintBurst<=0){w.sprintBurst=2.5;w._sprintCd=sprintCooldown;}
  }

  // Curl state
  if(w.curled){
    w.curlT=Math.max(0,w.curlT-dt);
    if(w.curlT<=0){
      w.curled=false;w.curlManual=false;w.stag=0;w.cw=0;
      if(!isAI){addShake(3);sm='UNCURL \u2014 BURST!';smt=1.0;}
    }
    return;
  }

  if(w.stunned>0){w.stunned=Math.max(0,w.stunned-dt);return;}
  const cfg=getDiffCfg();

  // SHELL upgrade — extends capture window for player
  let capTimer=cfg.capTimer;
  if(!isAI){
    const shell=burrowUpgrades.shell||1;
    if(shell>=2)capTimer*=1.20;
    if(shell>=3)capTimer*=1.10;
    if(shell>=4)capTimer*=1.15;
    if(shell>=5)capTimer*=1.18;
    if(shell>=7)capTimer*=1.20;
    if(shell>=8)capTimer*=1.22;
    // GEAR: capture window bonus
    const _capGs=getGearStats();
    if(_capGs.capture_resist)capTimer*=(1+_capGs.capture_resist/100);
    // BOOTS item — freeze/stun immunity
    // GEAR: Blink Boots Fiendish unique (null_step) grants freeze immunity
    if(hasUnique('null_step')||hasUnique('nyx_phase')){if(w.freeze>0)w.freeze=0;}
  }

  w.stag+=dt;w.cw=Math.min(1,w.stag/capTimer);
  if(w.stag>=capTimer){
    if(w.shield){
      w.shield=false;w.stag=0;w.cw=0;
      pupMsg='SHELL ABSORBED CAPTURE';pupMsgCol=PUPS.SHIELD.col;pupMsgT=1.8;
    } else {
      const shell=burrowUpgrades.shell||1;
      const voidPlate=shell>=4&&raidMode;
      // T9: SCUTE PRIME — immune to first capture per match
      if(!isAI&&shell>=9&&!w._primeUsed){w._primeUsed=true;w.stag=0;w.cw=0;sm='⬡ SCUTE PRIME — FIRST CAPTURE ABSORBED';smt=2.5;return;}
      // GEAR unique — absorb_capture from Fiendish items
      if(!isAI&&hasUnique('absorb_capture')&&!w._gearAbsorbUsed){
        w._gearAbsorbUsed=true;w.stag=0;w.cw=0;sm='⬡ FIENDISH GEAR — CAPTURE ABSORBED';smt=2.2;return;
      }
      w.fcc++;w.stag=0;w.cw=0;
      if(w.fcc>=3){
        w.fcc=3;
        if(!raidMode&&gameMode!=='janitor'&&!elimPending){
          elimPending=true;elimTimer=0.5;
          if(!isAI){
            addShake(12);addDmgVignette(180,0,0,0.6);
            sm='\u2620 ELIMINATED \u2014 3 CAPTURES \u2014 YOU LOSE';smt=2.0;
          } else {
            addShake(8);
            sm='\u2694 ECHO-7 ELIMINATED \u2014 3 CAPTURES \u2014 YOU WIN';smt=2.0;
          }
        }
      }
      w.curled=true;w.curlManual=false;
      w.curlT=shell>=7?6.0:voidPlate?5.0:3.5;
      w._voidPlateCharge=shell>=7?2:(voidPlate?1:0); // T7: absorbs 2 hits
      if(!isAI){addShake(6);sm='\u25cf FILTER CAPTURE \u2014 FORCED CURL'+(voidPlate?' \u25c9 VOID PLATE':'')+' ';smt=2.0;}
      // T3: Spiked stagger
      if(!isAI&&shell>=3&&gameMode!=='solo'){
        const dist=Math.hypot(p2.gx-w.gx,p2.gy-w.gy);
        if(dist<4){p2.stunned=1.0;sm+='\u25cf SPIKED \u2014 OPPONENT STAGGERED';smt=2.0;}
      }
      // T6: Resonant — stun pulse in 5-cell radius
      if(!isAI&&shell>=6&&gameMode!=='solo'){
        const dist6=Math.hypot(p2.gx-w.gx,p2.gy-w.gy);
        if(dist6<5){p2.stunned=1.8;addShake(4);sm='\u25cf RESONANT PULSE';smt=2.0;}
      }
    }
  }
  const cell=sub[w.gy][w.gx];
  w.mt+=effSpd(w,cell.d,cell.sf,isAI)*dt;
  let wSteps=0;
  while(w.mt>=1&&wSteps<8){w.mt-=1;advance(w,isAI);wSteps++;}
  if(w.mt>1)w.mt=0;
  w.px+=(w.gx*CS+CS/2-w.px)*0.45;w.py+=(GY+w.gy*CS+CS/2-w.py)*0.45;
}

function checkUnlocks(){

function checkEvent(dt){
  if(!currentLevel||!currentLevel.event||eventFired)return;
  const ev=currentLevel.event;
  const elapsed=180-gt;

  // ── SCRAMBLE — re-randomize zone seams ──
  if(ev.type==='scramble'&&elapsed>=ev.atTime){
    eventFired=true;eventFlash=1.5;
    const zones=Array.from({length:10},()=>({x:2+Math.random()*(COLS-4),y:2+Math.random()*(ROWS-4)}));
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      let md=Infinity,nz=0;
      zones.forEach((z,i)=>{const d=Math.hypot(c-z.x,r-z.y);if(d<md){md=d;nz=i;}});
      sub[r][c].zone=nz;
    }
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      sub[r][c].seam=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].some(
        ([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&sub[nr][nc].zone!==sub[r][c].zone);
    }
    sm='\u26a1 THE SUBSTRATE FRACTURES \u2014 ZONE TOPOLOGY SCRAMBLED';smt=3.5;
  }

  // ── ISOLATE — isolation cages ──
  if(ev.type==='isolate'&&!isolateOpen){
    if(elapsed>=6&&!cageBreach){
      cageBreach=true;
      const p1sx=Math.floor(COLS*0.25),p1sy=Math.floor(ROWS/2);
      const p2sx=Math.floor(COLS*0.75),p2sy=Math.floor(ROWS/2);
      [[p1sx+4,p1sy],[p2sx-4,p2sy]].forEach(([hc,hr])=>{
        for(let o=-1;o<=1;o++){
          const r=hr+o,c=hc;
          if(r>=0&&r<ROWS&&c>=0&&c<COLS){
            sub[r][c].tempLock=false;sub[r][c].lock=0;sub[r][c].uf=2.5;
            tempLocks.delete(r+','+c);
          }
        }
      });
      sm='\u25a0 CAGE BREACH \u2014 HOLE OPENED';smt=2.0;
    }
    if(elapsed>=ev.duration){
      isolateOpen=true;eventFlash=2.0;
      sm='\u25a0 ISOLATION DISSOLVED \u2014 SUBSTRATE OPEN';smt=2.5;
      for(const k of tempLocks){
        const[r,c]=k.split(',').map(Number);
        sub[r][c].tempLock=false;sub[r][c].lock=0;sub[r][c].uf=2;
      }
      eventFired=true;
    }
  }

  // ── INVERT — controls flip for duration ──
  if(ev.type==='invert'){
    if(elapsed>=ev.atTime&&!ev._fired){
      ev._fired=true;ev._invertEnd=elapsed+ev.duration;eventFlash=1.5;
      sm='\u21ba SUBSTRATE REWIRED \u2014 CONTROLS INVERTED FOR '+ev.duration+'s';smt=3.0;
    }
    if(ev._fired&&elapsed>=ev._invertEnd&&!eventFired){
      eventFired=true;eventFlash=0.8;
      sm='\u21ba CONTROLS RESTORED';smt=1.5;
    }
  }

  // ── SURGE — score multiplier window ──
  if(ev.type==='surge'){
    if(elapsed>=ev.atTime&&!ev._fired){
      ev._fired=true;ev._surgeEnd=elapsed+ev.duration;eventFlash=2.0;
      sm='\u25b2 DENSITY SURGE \u2014 DOUBLE SCORE FOR '+ev.duration+'s';smt=3.0;
    }
    if(ev._fired&&elapsed>=ev._surgeEnd&&!eventFired){
      eventFired=true;
      sm='\u25b2 SURGE ENDED';smt=1.5;
    }
  }

  // ── TREMOR — waves of temporary void cells ──
  if(ev.type==='tremor'){
    if(!ev._wavesFired)ev._wavesFired=0;
    if(!ev._voidCells)ev._voidCells=[];
    // Restore expired void cells
    ev._voidCells=ev._voidCells.filter(({r,c,exp})=>{
      if(elapsed>=exp){sub[r][c].voided=0;return false;}
      return true;
    });
    // Fire waves
    const waveAt=ev.atTime+ev._wavesFired*ev.waveInterval;
    if(elapsed>=waveAt&&ev._wavesFired<ev.waves){
      ev._wavesFired++;eventFlash=1.2;
      const count=12+ev._wavesFired*4;
      let added=0,att=0;
      while(added<count&&att<200){
        att++;
        const r=1+Math.floor(Math.random()*(ROWS-2));
        const c=1+Math.floor(Math.random()*(COLS-2));
        if(!sub[r][c].tempLock&&!sub[r][c].voided){
          sub[r][c].voided=12;
          ev._voidCells.push({r,c,exp:elapsed+10});
          added++;
        }
      }
      sm='\u2665 TREMOR WAVE '+ev._wavesFired+'/'+ev.waves+' \u2014 SUBSTRATE SHAKING';smt=2.0;
    }
    if(ev._wavesFired>=ev.waves&&ev._voidCells.length===0)eventFired=true;
  }
}

function spawnPup(){
  if(powerups.length>=3)return;
  let type;
  if(raidMode&&Math.random()<0.38){type='HEALTH';}
  else{const pool=raidMode?PTYPES:BASE_PTYPES;type=pool[Math.floor(Math.random()*pool.length)];}
  let att=0,r,c;
  do{r=2+Math.floor(Math.random()*(ROWS-4));c=2+Math.floor(Math.random()*(COLS-4));att++;}
  while(att<40&&(sub[r][c].lock>0||(raidMode&&(sub[r][c].devoured||boss.cells.has(r+','+c)))||sub[r][c].tempLock||powerups.some(p=>p.r===r&&p.c===c)||
    (Math.abs(r-p1.gy)<2&&Math.abs(c-p1.gx)<2)||
    (gameMode!=='solo'&&Math.abs(r-p2.gy)<2&&Math.abs(c-p2.gx)<2)));
  if(att<40)powerups.push({r,c,type,age:0});
  pupTimer=(raidMode?12:getDiffCfg().pupRate)+Math.random()*6;
}

function spawnBoardItem(forceTier){
  if(boardItems.length>=2)return; // max 2 on board at once
  const src=raidMode?'raid':'campaign';
  const items=rollDrops(src);
  if(!items.length)return;
  const item=forceTier?makeItem(['helm','armor','boots'][Math.floor(Math.random()*3)],null,forceTier):items[0];
  if(!item)return;
  // Find an open cell not near players or boss
  let att=0,r,c;
  do{
    r=2+Math.floor(Math.random()*(ROWS-4));
    c=2+Math.floor(Math.random()*(COLS-4));
    att++;
  } while(att<50&&(
    sub[r][c].lock>0||sub[r][c].devoured||sub[r][c].tempLock||
    powerups.some(p=>p.r===r&&p.c===c)||
    boardItems.some(b=>b.r===r&&b.c===c)||
    (Math.abs(r-p1.gy)<3&&Math.abs(c-p1.gx)<3)||
    (gameMode!=='solo'&&Math.abs(r-p2.gy)<3&&Math.abs(c-p2.gx)<3)

  if(att>=50)return;

  itemDropTimer=(45+Math.random()*30)*(diffScale[difficulty]||1);
}
